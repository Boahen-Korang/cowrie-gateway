<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ivory:#F7F5F0;--ivory-2:#FBFAF6;--white:#FFF;--ink:#1B1330;--ink-soft:#564E68;--muted:#7A7388;--faint:#A39CB0;--line:#E8E3DA;--line-2:#EFEBE3;--plum:#5B2C8F;--plum-tint:#EFE6F7;--gold:#E0A12E;--gold-deep:#B8801C;--gold-tint:#F8EFD9;--mint:#1FA877;--mint-tint:#DCF1E9;--coral:#EF6A4C;--coral-tint:#FBE7E1;--display:'Plus Jakarta Sans',sans-serif;--body:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ivory);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer}
.shell{width:22px;height:22px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),#7B45B8);position:relative;flex-shrink:0}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.6);transform:translateX(-50%);border-radius:2px}
.top{background:var(--white);border-bottom:1px solid var(--line);padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:-.02em}
.logo .tag{font-family:var(--mono);font-size:9.5px;font-weight:400;color:var(--faint);border:1px solid var(--line);padding:2px 7px;border-radius:5px}
.top .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13.5px}
.top .biz{font-weight:600}.top .out{font-family:var(--mono);font-size:12px;color:var(--muted)}.top .out:hover{color:var(--coral)}
.btn{font-weight:600;font-size:13.5px;border-radius:10px;border:1.5px solid transparent;padding:10px 16px;display:inline-flex;align-items:center;gap:7px}
.btn-plum{background:var(--plum);color:#fff}.btn-plum:hover{background:#3A1A60}
.wrap{max-width:1080px;margin:0 auto;padding:clamp(20px,3vw,32px) clamp(16px,4vw,40px) 70px}
h1{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em}
.sub{color:var(--muted);font-size:14px;margin:5px 0 24px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:15px;padding:18px 20px}
.kpi .l{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.kpi .v{font-family:var(--display);font-weight:800;font-size:26px;margin-top:8px;letter-spacing:-.02em}
@media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}}
.keys{background:var(--white);border:1px solid var(--line);border-radius:15px;padding:18px 20px;margin-bottom:22px}
.keys h3{font-family:var(--display);font-weight:700;font-size:15px;margin-bottom:14px}
.keyrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.keyrow:last-child{border-bottom:none}.keyrow .k{font-family:var(--mono);font-size:11px;color:var(--muted);width:90px}
.keyrow .val{font-family:var(--mono);font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy{margin-left:auto;background:var(--ivory-2);border:1px solid var(--line);color:var(--plum);font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;flex-shrink:0}
.card{background:var(--white);border:1px solid var(--line);border-radius:15px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line-2)}
.card-h h3{font-family:var(--display);font-weight:700;font-size:15px}
.card-h .live{font-family:var(--mono);font-size:11px;color:var(--mint);display:flex;align-items:center;gap:6px}
.card-h .live .d{width:7px;height:7px;border-radius:50%;background:var(--mint);animation:b 1.5s infinite}
@keyframes b{0%,100%{opacity:1}50%{opacity:.3}}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);text-align:left;padding:12px 20px;border-bottom:1px solid var(--line-2);font-weight:500}
td{padding:13px 20px;border-bottom:1px solid var(--line-2);font-size:13.5px}
tr:last-child td{border-bottom:none}
.ref{font-family:var(--mono);font-size:12px}
.amt{font-family:var(--mono);font-weight:700}
.pill{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.pill .d{width:6px;height:6px;border-radius:50%}
.pill.success{background:var(--mint-tint);color:var(--mint)}.pill.success .d{background:var(--mint)}
.pill.pending,.pill.requires_otp,.pill.requires_approval,.pill.awaiting_transfer,.pill.awaiting_ussd{background:var(--gold-tint);color:var(--gold-deep)}.pill.pending .d{background:var(--gold-deep)}
.pill.failed{background:var(--coral-tint);color:var(--coral)}.pill.failed .d{background:var(--coral)}
.empty{padding:46px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px}
.mtag{font-family:var(--mono);font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="top">
  <a href="/" class="logo"><span class="shell"></span>Cowrie<span class="tag">DASHBOARD</span></a>
  <div class="right">
    <a href="/checkout" target="_blank" class="btn btn-plum">Test a payment</a>
    <span class="biz" id="biz">—</span>
    <a href="#" class="out" id="out">Sign out</a>
  </div>
</div>
<div class="wrap">
  <h1>Overview</h1>
  <div class="sub">Live payments flowing through your Cowrie integration.</div>
  <div class="kpis">
    <div class="kpi"><div class="l">Collected</div><div class="v" id="kCollected">—</div></div>
    <div class="kpi"><div class="l">Transactions</div><div class="v" id="kCount">—</div></div>
    <div class="kpi"><div class="l">Successful</div><div class="v" id="kSuccess">—</div></div>
    <div class="kpi"><div class="l">Success rate</div><div class="v" id="kRate">—</div></div>
  </div>
  <div class="keys">
    <h3>API keys</h3>
    <div class="keyrow"><span class="k">PUBLIC</span><span class="val" id="pk">—</span><button class="copy" data-t="pk">copy</button></div>
    <div class="keyrow"><span class="k">SECRET</span><span class="val" id="sk">—</span><button class="copy" data-t="sk">copy</button></div>
  </div>
  <div class="card">
    <div class="card-h"><h3>Transactions</h3><span class="live"><span class="d"></span>LIVE</span></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Reference</th><th>Method</th><th>Email</th><th>Amount</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table></div>
  </div>
</div>

<script>
const token=localStorage.getItem('cowrie_token');
if(!token){location.href='/login';}
const SYM={GHS:'\u20B5',NGN:'\u20A6',KES:'KSh',ZAR:'R',USD:'$',GBP:'\u00A3',EUR:'\u20AC'};
const fmt=(m,c)=> (SYM[c]||'')+' '+(m/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
let merchant=null;
try{merchant=JSON.parse(localStorage.getItem('cowrie_merchant'));}catch(e){}

document.getElementById('out').addEventListener('click',e=>{e.preventDefault();localStorage.clear();location.href='/login';});
document.querySelectorAll('.copy').forEach(b=>b.addEventListener('click',()=>{const v=document.getElementById(b.dataset.t).textContent;navigator.clipboard&&navigator.clipboard.writeText(v);b.textContent='copied';setTimeout(()=>b.textContent='copy',1200);}));

async function api(path){const r=await fetch('/api'+path,{headers:{authorization:'Bearer '+token}});if(r.status===401){localStorage.clear();location.href='/login';return;}return r.json();}

const METHOD={card:'Card',mobile_money:'Mobile money',bank_transfer:'Bank transfer',ussd:'USSD'};

async function load(){
  const me=await api('/me'); if(!me)return;
  merchant=me.merchant;
  document.getElementById('biz').textContent=merchant.business_name;
  document.getElementById('pk').textContent=merchant.public_key;
  document.getElementById('sk').textContent=merchant.secret_key||'sk_test_\u2022\u2022\u2022';
  const t=await api('/transactions'); const list=(t&&t.data)||[];
  const succ=list.filter(c=>c.status==='success');
  const collected=succ.reduce((s,c)=>s+c.amount,0);
  document.getElementById('kCollected').textContent=fmt(collected,merchant_ccy(list));
  document.getElementById('kCount').textContent=list.length;
  document.getElementById('kSuccess').textContent=succ.length;
  document.getElementById('kRate').textContent=list.length?Math.round(succ.length/list.length*100)+'%':'—';
  const rows=document.getElementById('rows');
  rows.innerHTML=list.length?list.map(c=>`<tr>
    <td class="ref">${c.reference}</td>
    <td class="mtag">${METHOD[c.method]||c.method||'—'}</td>
    <td class="mtag">${c.customer_email||'—'}</td>
    <td class="amt">${fmt(c.amount,c.currency)}</td>
    <td><span class="pill ${c.status}"><span class="d"></span>${c.status.replace(/_/g,' ')}</span></td>
  </tr>`).join(''):'<tr><td colspan="5"><div class="empty">No payments yet. Click \u201cTest a payment\u201d to create one \u2014 it\u2019ll appear here.</div></td></tr>';
}
function merchant_ccy(list){return (list[0]&&list[0].currency)||'GHS';}
load(); setInterval(load,3000);
</script>
</body>
</html>
