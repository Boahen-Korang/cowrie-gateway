<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie Checkout — Adɔm Stores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#F7F5F0; --ivory-2:#FBFAF6; --white:#FFFFFF;
  --ink:#1B1330; --ink-soft:#564E68; --muted:#7A7388; --faint:#A39CB0;
  --line:#E8E3DA; --line-2:#EFEBE3;
  --plum:#5B2C8F; --plum-deep:#3A1A60; --plum-br:#7B45B8; --plum-tint:#EFE6F7;
  --gold:#E0A12E; --gold-deep:#B8801C; --gold-tint:#F8EFD9;
  --mint:#1FA877; --mint-tint:#DCF1E9; --coral:#EF6A4C; --coral-tint:#FBE7E1;
  --display:'Plus Jakarta Sans',sans-serif; --body:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ivory);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;display:grid;place-items:center;padding:24px 16px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(60vw 50vw at 80% -10%,var(--plum-tint),transparent 60%),radial-gradient(50vw 40vw at 10% 110%,var(--gold-tint),transparent 60%);opacity:.7}
::selection{background:var(--plum);color:#fff}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}
.shell{width:22px;height:22px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum-br));position:relative;box-shadow:inset 0 -2px 4px rgba(0,0,0,.2);flex-shrink:0}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.6);transform:translateX(-50%);border-radius:2px}

.checkout{position:relative;z-index:1;width:min(94vw,440px);background:var(--white);border:1px solid var(--line);border-radius:22px;box-shadow:0 40px 90px -40px rgba(27,19,48,.4);overflow:hidden}

/* header */
.co-head{padding:20px 22px 18px;border-bottom:1px solid var(--line-2);position:relative}
.co-merch{display:flex;align-items:center;gap:11px}
.co-merch .av{width:40px;height:40px;border-radius:11px;background:var(--plum);display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--display);font-size:17px}
.co-merch .nm{font-weight:700;font-size:15px}.co-merch .url{font-family:var(--mono);font-size:11px;color:var(--muted)}
.co-timer{position:absolute;top:20px;right:22px;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--ivory-2);border:1px solid var(--line);padding:4px 9px;border-radius:7px}
.co-amt{margin-top:16px;display:flex;align-items:baseline;gap:8px}
.co-amt .l{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.co-amt .v{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.02em;margin-left:auto}
.co-email{margin-top:12px;width:100%;background:var(--ivory-2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-family:var(--body);font-size:13.5px;color:var(--ink);outline:none}
.co-email:focus{border-color:var(--plum);background:var(--white)}

/* test badge */
.testbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--gold-deep);background:var(--gold-tint);padding:3px 8px;border-radius:6px;margin-top:14px}

/* method tabs */
.co-body{padding:18px 22px 22px}
.methods{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:18px}
.mtab{display:flex;flex-direction:column;align-items:center;gap:6px;padding:11px 4px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);transition:.18s;font-size:11px;font-weight:600;color:var(--ink-soft)}
.mtab:hover{border-color:var(--plum-tint)}
.mtab.on{border-color:var(--plum);background:var(--plum-tint);color:var(--plum)}
.mtab .mi{width:24px;height:24px}.mtab .mi svg{width:22px;height:22px}

/* form fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}
.inp-wrap{position:relative}
.field input,.field select{width:100%;background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:14.5px;color:var(--ink);outline:none;transition:.18s}
.field input.mono{font-family:var(--mono);letter-spacing:.04em}
.field input:focus,.field select:focus{border-color:var(--plum);box-shadow:0 0 0 4px var(--plum-tint)}
.field input.bad{border-color:var(--coral);box-shadow:0 0 0 4px var(--coral-tint)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.brand-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;font-weight:700;color:var(--plum);background:var(--plum-tint);padding:3px 7px;border-radius:5px}
.err{color:var(--coral);font-size:11.5px;margin-top:5px;display:none}.err.show{display:block}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.seg button{border:1.5px solid var(--line);background:var(--white);border-radius:10px;padding:10px 4px;font-size:12px;font-weight:600;color:var(--ink-soft);transition:.18s}
.seg button.on{border-color:var(--plum);background:var(--plum-tint);color:var(--plum)}
.hint{font-size:11.5px;color:var(--muted);margin:2px 0 12px;display:flex;align-items:center;gap:6px}
.hint b{color:var(--ink);font-family:var(--mono)}

/* pay button */
.pay{width:100%;background:var(--plum);color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15.5px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.22s;position:relative;margin-top:4px}
.pay:hover{background:var(--plum-deep)}
.pay:disabled{opacity:.5;pointer-events:none}
.pay.loading{color:transparent;pointer-events:none}
.pay .spin{position:absolute;width:19px;height:19px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:none;animation:spin .7s linear infinite}
.pay.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* transfer / ussd detail */
.detail-box{background:var(--ivory-2);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin-bottom:14px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.drow:last-child{border-bottom:none}
.drow .k{font-family:var(--mono);font-size:11px;color:var(--muted)}
.drow .v{font-family:var(--mono);font-weight:700;display:flex;align-items:center;gap:8px}
.copy{background:var(--white);border:1px solid var(--line);color:var(--plum);font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px}
.copy:hover{background:var(--plum-tint)}
.ussd-code{text-align:center;font-family:var(--mono);font-weight:700;font-size:24px;letter-spacing:.04em;background:var(--ivory-2);border:1px dashed var(--plum-br);border-radius:12px;padding:18px;margin-bottom:14px;color:var(--plum)}

/* back link */
.back{display:inline-flex;align-items:center;gap:7px;background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:12px;margin-bottom:14px}
.back:hover{color:var(--plum)}

/* OTP / approve states */
.state{text-align:center;padding:18px 6px}
.state .ic{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px}
.state h3{font-family:var(--display);font-weight:700;font-size:19px}
.state p{color:var(--ink-soft);font-size:14px;margin-top:8px;max-width:300px;margin-inline:auto}
.spinbig{width:50px;height:50px;border:4px solid var(--line);border-top-color:var(--plum);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
.otp-boxes{display:flex;gap:9px;justify-content:center;margin:20px 0 14px}
.otp-boxes input{width:42px;height:52px;text-align:center;font-family:var(--mono);font-weight:700;font-size:22px;border:1.5px solid var(--line);border-radius:11px;outline:none;color:var(--ink)}
.otp-boxes input:focus{border-color:var(--plum);box-shadow:0 0 0 4px var(--plum-tint)}
.resend{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:6px}
.resend b{color:var(--ink)}
.done-ic{background:var(--mint);color:#fff;box-shadow:0 0 40px -8px rgba(31,168,119,.5)}
.phone-pulse{background:var(--plum-tint);color:var(--plum);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--plum-tint)}50%{box-shadow:0 0 0 10px transparent}}
.receipt{background:var(--ivory-2);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin:16px 0;text-align:left}

/* footer */
.co-foot{padding:14px 22px;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.co-foot .lock{display:flex;align-items:center;gap:5px}
.co-foot .pwr{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--ink-soft);font-weight:600}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="checkout">
  <div class="co-head">
    <div class="co-merch"><div class="av">A</div><div><div class="nm">Adɔm Stores</div><div class="url">checkout.cowrie.africa</div></div></div>
    <div class="co-timer" id="timer">14:59</div>
    <div class="co-amt"><span class="l" id="amtLbl">Pay Adɔm Stores</span><span class="v" id="amtV">₵ 250.00</span></div>
    <input class="co-email" id="email" type="email" value="ama@adom.shop" placeholder="Email address">
    <span class="testbadge"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg> TEST MODE</span>
  </div>
  <div class="co-body" id="body"></div>
  <div class="co-foot">
    <span class="lock"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg> PCI-DSS secured</span>
    <span class="pwr"><span class="shell"></span>Cowrie</span>
  </div>
</div>

<script>
"use strict";
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=s=>document.querySelector(s);
const SYM={GHS:'\u20B5',NGN:'\u20A6',KES:'KSh',ZAR:'R',XOF:'CFA',USD:'$',GBP:'\u00A3',EUR:'\u20AC'};
const params=new URLSearchParams(location.search);
let CFG={currency:'GHS'}, CH=null;
const S={method:'card',provider:'MTN'};

const sym =()=>SYM[(CH&&CH.currency)||CFG.currency||'GHS']||'';
const fmt =m=>sym()+' '+(m/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

async function api(path,opts){
  const r=await fetch('/api'+path,Object.assign({headers:{'content-type':'application/json'}},opts));
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw Object.assign(new Error(d.message||'Request failed'),{data:d});
  return d;
}

/* session timer */
(function(){let t=899;const e=$('#timer');setInterval(()=>{if(reduce)return;t=Math.max(0,t-1);const m=Math.floor(t/60),s=t%60;e.textContent=m+':'+s.toString().padStart(2,'0');e.style.color=t<120?'var(--coral)':'';},1000);})();

const ICONS={
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
  bank:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6"/></svg>',
  momo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>',
  ussd:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h14M5 21h14M7 3v18M17 3v18M9 8h6M9 12h6"/></svg>'
};
const MKEY={card:'card',momo:'mobile_money',bank:'bank_transfer',ussd:'ussd'};
const METHODS=[['card','Card'],['momo','Mobile money'],['bank','Bank'],['ussd','USSD']];

async function init(){
  try{CFG=await api('/config');}catch(e){}
  if(CFG.merchant_name){const nm=document.querySelector('.co-merch .nm');if(nm)nm.textContent=CFG.merchant_name;
    const av=document.querySelector('.co-merch .av');if(av)av.textContent=CFG.merchant_name[0];}
  try{
    const ref=params.get('reference');
    if(ref){CH=await api('/charges/'+ref);}
    else{
      const amt=parseInt(params.get('amount')||'25000',10);
      CH=await api('/charges',{method:'POST',body:JSON.stringify({
        public_key:CFG.public_key,amount:amt,currency:CFG.currency,
        email:params.get('email')||$('#email').value})});
    }
  }catch(e){return fatal(e.message);}
  $('#amtV').textContent=fmt(CH.amount);
  if(CH.customer_email)$('#email').value=CH.customer_email;
  route();
}
function fatal(msg){$('#body').innerHTML=`<div class="state"><div class="ic" style="background:var(--coral-tint);color:var(--coral)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg></div><h3>Couldn't start checkout</h3><p>${msg}</p></div>`;}

function route(){
  const b=$('#body');
  switch(CH.status){
    case 'requires_otp': return renderOtp(b);
    case 'requires_approval': return renderApprove(b);
    case 'awaiting_transfer': return renderBank(b);
    case 'awaiting_ussd': return renderUssd(b);
    case 'success': return renderSuccess(b);
    default: return renderForm(b);
  }
}
const payBtn=l=>`<button class="pay" id="pay"><span class="spin"></span><span class="lbl">${l}</span></button>`;
function tabs(){return `<div class="methods">${METHODS.map(m=>`<button class="mtab ${S.method===m[0]?'on':''}" data-m="${m[0]}"><span class="mi">${ICONS[m[0]]}</span>${m[1]}</button>`).join('')}</div>`;}

function renderForm(b){
  $('#amtLbl').textContent='Pay '+(CFG.merchant_name||'merchant');
  b.innerHTML=tabs()+formFor(S.method);
  b.querySelectorAll('.mtab').forEach(t=>t.addEventListener('click',()=>{S.method=t.dataset.m;renderForm(b);}));
  bindForm();
}
function formFor(m){
  if(m==='card')return `
    <div class="field"><label>Card number</label><div class="inp-wrap">
      <input class="mono" id="ccn" inputmode="numeric" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="cc-number">
      <span class="brand-badge" id="brand" style="display:none"></span></div>
      <div class="err" id="ccnErr">Enter a valid card number</div></div>
    <div class="row2">
      <div class="field"><label>Expiry</label><input class="mono" id="exp" inputmode="numeric" placeholder="MM / YY" maxlength="7"><div class="err" id="expErr">Invalid</div></div>
      <div class="field"><label>CVV</label><input class="mono" id="cvv" inputmode="numeric" placeholder="123" maxlength="4"><div class="err" id="cvvErr">Invalid</div></div>
    </div>
    <div class="hint"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Test card: <b>4242 4242 4242 4242</b> &middot; any future date &middot; OTP <b>123456</b></div>
    ${payBtn('Pay '+fmt(CH.amount))}`;
  if(m==='momo')return `
    <div class="field"><label>Network</label></div>
    <div class="seg" id="prov">${['MTN','Vodafone','AirtelTigo'].map(p=>`<button data-p="${p}" class="${S.provider===p?'on':''}">${p}</button>`).join('')}</div>
    <div class="field"><label>Mobile money number</label><input class="mono" id="phone" inputmode="numeric" placeholder="024 123 4567" maxlength="13"><div class="err" id="phoneErr">Enter a valid 10-digit number</div></div>
    <div class="hint"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>You'll approve a prompt on your phone.</div>
    ${payBtn('Pay '+fmt(CH.amount))}`;
  if(m==='bank')return `
    <div class="hint" style="margin-top:0"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>We'll generate a one-time account for this payment.</div>
    ${payBtn('Continue with bank transfer')}`;
  if(m==='ussd')return `
    <div class="hint" style="margin-top:0"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>We'll generate a USSD code to dial on your phone.</div>
    ${payBtn('Continue with USSD')}`;
}

function bindForm(){
  const pay=$('#pay');
  if(S.method==='card'){
    const ccn=$('#ccn'),exp=$('#exp'),cvv=$('#cvv'),brand=$('#brand');
    ccn.addEventListener('input',()=>{let v=ccn.value.replace(/\D/g,'').slice(0,16);ccn.value=v.replace(/(.{4})/g,'$1 ').trim();
      const b=detectBrand(v);if(b){brand.textContent=b;brand.style.display='';}else brand.style.display='none';ccn.classList.remove('bad');$('#ccnErr').classList.remove('show');});
    exp.addEventListener('input',()=>{let v=exp.value.replace(/\D/g,'').slice(0,4);if(v.length>=3)v=v.slice(0,2)+' / '+v.slice(2);exp.value=v;exp.classList.remove('bad');});
    cvv.addEventListener('input',()=>{cvv.value=cvv.value.replace(/\D/g,'').slice(0,4);cvv.classList.remove('bad');});
    pay.addEventListener('click',async()=>{
      let ok=true;const num=ccn.value.replace(/\s/g,'');
      if(num.length<16||!luhn(num)){ccn.classList.add('bad');$('#ccnErr').classList.add('show');ok=false;}
      const em=exp.value.replace(/\D/g,'');if(em.length<4||+em.slice(0,2)<1||+em.slice(0,2)>12){exp.classList.add('bad');$('#expErr').classList.add('show');ok=false;}
      if(cvv.value.length<3){cvv.classList.add('bad');$('#cvvErr').classList.add('show');ok=false;}
      if(!ok)return;
      await submitMethod(pay,'card',{number:num,expiry:em,cvv:cvv.value});
    });
  } else if(S.method==='momo'){
    $('#prov').querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{S.provider=btn.dataset.p;$('#prov').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));}));
    const phone=$('#phone');
    phone.addEventListener('input',()=>{phone.value=phone.value.replace(/[^\d ]/g,'');phone.classList.remove('bad');$('#phoneErr').classList.remove('show');});
    pay.addEventListener('click',async()=>{const d=phone.value.replace(/\D/g,'');if(d.length<10){phone.classList.add('bad');$('#phoneErr').classList.add('show');return;}
      await submitMethod(pay,'mobile_money',{provider:S.provider,phone:d});});
  } else if(S.method==='bank'){
    pay.addEventListener('click',()=>submitMethod(pay,'bank_transfer',{}));
  } else if(S.method==='ussd'){
    pay.addEventListener('click',()=>submitMethod(pay,'ussd',{}));
  }
}

async function submitMethod(btn,method,details){
  btn.classList.add('loading');
  try{
    CH=await api('/charges/'+CH.reference+'/method',{method:'POST',body:JSON.stringify({method,details})});
    route();
    if(method==='mobile_money') autoConfirm(); // simulate the phone PIN approval
  }catch(e){ btn.classList.remove('loading'); alert(e.message); }
}

/* card 3DS OTP */
function renderOtp(b){
  b.innerHTML=`<button class="back" id="back">\u2190 Back</button>
    <div class="state"><div class="ic" style="background:var(--plum-tint);color:var(--plum)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
    <h3>Verify it's you</h3><p>${(CH.next_action&&CH.next_action.message)||'Enter the 6-digit 3-D Secure code.'}</p>
    <div class="otp-boxes" id="otp">${Array.from({length:6}).map(()=>`<input inputmode="numeric" maxlength="1">`).join('')}</div>
    <button class="pay" id="verify" disabled><span class="spin"></span><span class="lbl">Verify &amp; pay ${fmt(CH.amount)}</span></button>
    <div class="resend" id="resend">Resend code in <b>30s</b></div></div>`;
  $('#back').addEventListener('click',route);
  const boxes=[...$('#otp').querySelectorAll('input')];
  const check=()=>{$('#verify').disabled=boxes.map(x=>x.value).join('').length<6;};
  boxes.forEach((bx,i)=>{bx.addEventListener('input',()=>{bx.value=bx.value.replace(/\D/g,'');if(bx.value&&i<5)boxes[i+1].focus();check();});
    bx.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!bx.value&&i>0)boxes[i-1].focus();});});
  boxes[0].focus();
  $('#verify').addEventListener('click',async()=>{const v=$('#verify');v.classList.add('loading');
    try{CH=await api('/charges/'+CH.reference+'/authorize',{method:'POST',body:JSON.stringify({otp:boxes.map(x=>x.value).join('')})});route();}
    catch(e){v.classList.remove('loading');alert(e.message);}});
  let t=30;const r=$('#resend');const iv=setInterval(()=>{if(reduce){clearInterval(iv);r.innerHTML='Code resent';return;}t--;if(t<=0){clearInterval(iv);r.innerHTML='<a href="#" style="color:var(--plum)">Resend code</a>';}else r.innerHTML='Resend code in <b>'+t+'s</b>';},1000);
}

/* momo approve */
function renderApprove(b){
  b.innerHTML=`<div class="state"><div class="ic phone-pulse"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg></div>
    <h3>Approve on your phone</h3><p>${(CH.next_action&&CH.next_action.message)||'Approve the prompt on your phone'} Enter your PIN to authorise ${fmt(CH.amount)}.</p>
    <div class="spinbig" style="margin-top:18px"></div></div>`;
}
function autoConfirm(){ // the operator confirms once the customer enters their PIN
  const run=async()=>{try{CH=await api('/charges/'+CH.reference+'/confirm',{method:'POST'});route();}catch(e){}};
  if(reduce)run();else setTimeout(run,3200);
}

/* bank transfer */
function renderBank(b){
  const a=(CH.next_action&&CH.next_action.account)||{};
  b.innerHTML=`<button class="back" id="back">\u2190 Back</button>
    <div class="detail-box">
      <div class="drow"><span class="k">BANK</span><span class="v">${a.bank||''}</span></div>
      <div class="drow"><span class="k">ACCOUNT</span><span class="v">${a.account||''} <button class="copy" data-c="${a.account||''}">copy</button></span></div>
      <div class="drow"><span class="k">AMOUNT</span><span class="v">${fmt(CH.amount)} <button class="copy" data-c="${(CH.amount/100).toFixed(2)}">copy</button></span></div>
      <div class="drow"><span class="k">REFERENCE</span><span class="v">${a.reference||''} <button class="copy" data-c="${a.reference||''}">copy</button></span></div>
    </div>
    <div class="hint"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Transfer to this one-time account; we detect it automatically.</div>
    ${payBtn("I've sent the transfer")}`;
  $('#back').addEventListener('click',route);
  b.querySelectorAll('.copy').forEach(c=>c.addEventListener('click',()=>{navigator.clipboard&&navigator.clipboard.writeText(c.dataset.c).catch(()=>{});c.textContent='copied';setTimeout(()=>c.textContent='copy',1200);}));
  $('#pay').addEventListener('click',()=>confirmExternal($('#pay')));
}

/* ussd */
function renderUssd(b){
  const code=(CH.next_action&&CH.next_action.code)||'';
  b.innerHTML=`<button class="back" id="back">\u2190 Back</button>
    <div class="ussd-code">${code}</div>
    <div class="hint" style="margin-bottom:6px"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Dial this code on the phone linked to your bank, then confirm.</div>
    ${payBtn("I've completed the payment")}`;
  $('#back').addEventListener('click',route);
  $('#pay').addEventListener('click',()=>confirmExternal($('#pay')));
}
async function confirmExternal(btn){btn.classList.add('loading');
  try{$('#body').innerHTML=`<div class="state"><div class="spinbig"></div><h3>Confirming your payment\u2026</h3><p>We're waiting for the funds to land. This is usually instant.</p></div>`;
    CH=await api('/charges/'+CH.reference+'/confirm',{method:'POST'});route();}
  catch(e){alert(e.message);route();}
}

/* success */
function renderSuccess(b){
  $('#amtLbl').textContent='Paid to '+(CFG.merchant_name||'merchant');
  const methodLabel={card:'Card',mobile_money:(CH.card?'':'')+'Mobile money',bank_transfer:'Bank transfer',ussd:'USSD'}[CH.method]||CH.method;
  b.innerHTML=`<div class="state">
    <div class="ic done-ic"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h3>Payment successful</h3><p>Your payment of ${fmt(CH.amount)} is complete.</p>
    <div class="receipt">
      <div class="drow"><span class="k">REFERENCE</span><span class="v">${CH.reference}</span></div>
      <div class="drow"><span class="k">METHOD</span><span class="v">${methodLabel}${CH.card?' \u00b7\u00b7\u00b7\u00b7 '+CH.card.last4:''}</span></div>
      <div class="drow"><span class="k">AMOUNT</span><span class="v" style="color:var(--mint)">${fmt(CH.amount)}</span></div>
    </div>
    <button class="pay" id="ret">Return to ${CFG.merchant_name||'merchant'}</button></div>`;
  $('#ret').addEventListener('click',()=>{location.href='/';});
}

function detectBrand(v){if(/^4/.test(v))return'VISA';if(/^(5[1-5]|2[2-7])/.test(v))return'MASTERCARD';if(/^(506[01]|650|5078|6280)/.test(v))return'VERVE';return'';}
function luhn(n){let s=0,a=false;for(let i=n.length-1;i>=0;i--){let d=+n[i];if(a){d*=2;if(d>9)d-=9;}s+=d;a=!a;}return s%10===0;}

init();

</script>
