<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ─── Tokens ─── */
:root{
  --ivory:#0F0C22; --ivory-2:#141028; --white:#0D0A1E;
  --ink:#EAE5F5; --ink-soft:rgba(234,229,245,.65); --muted:rgba(234,229,245,.4); --faint:rgba(234,229,245,.22);
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.06);
  --plum:#5B2C8F; --plum-deep:#3A1A60; --plum-br:#7B45B8; --plum-tint:rgba(91,44,143,.22);
  --gold:#E0A12E; --gold-deep:#B8801C; --gold-tint:rgba(224,161,46,.18);
  --mint:#1FA877; --mint-tint:rgba(31,168,119,.18); --coral:#EF6A4C; --coral-tint:rgba(239,106,76,.15);
  --display:'Plus Jakarta Sans',sans-serif; --body:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
}

/* ─── Reset ─── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#09071A;color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh;overflow-x:hidden}
::selection{background:var(--plum);color:#fff}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ─── Background scene ─── */
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-grid{
  position:absolute;left:-40%;right:-40%;bottom:-5%;height:75%;
  background-image:linear-gradient(rgba(91,44,143,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(91,44,143,.25) 1px,transparent 1px);
  background-size:70px 70px;
  transform:perspective(550px) rotateX(58deg);transform-origin:center bottom;
  animation:gridScroll 10s linear infinite;
  mask-image:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 55%,transparent 100%);
  -webkit-mask-image:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 55%,transparent 100%);
}
@keyframes gridScroll{from{background-position:0 0}to{background-position:0 70px}}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:28px 28px}
.orb{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform}
.orb-1{width:700px;height:700px;top:-250px;left:-200px;background:radial-gradient(circle,rgba(91,44,143,.45),transparent 65%);animation:drift1 28s ease-in-out infinite}
.orb-2{width:580px;height:580px;bottom:-200px;right:-150px;background:radial-gradient(circle,rgba(200,134,10,.22),transparent 65%);animation:drift2 33s ease-in-out infinite}
.orb-3{width:450px;height:450px;top:40%;left:55%;background:radial-gradient(circle,rgba(31,168,119,.14),transparent 65%);animation:drift3 24s ease-in-out infinite;transform:translate(-50%,-50%)}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-55px) scale(1.05)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-35px,30px) scale(1.04)}}
@keyframes drift3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(calc(-50% + 28px),calc(-50% - 34px))}}

/* ─── App layer ─── */
.app{position:relative;z-index:1}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}

/* ─── Topbar ─── */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(9,7,26,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--line);transition:border-color .3s,background .3s;
}
.topbar.stuck{border-color:rgba(91,44,143,.3);background:rgba(9,7,26,.92)}
.topbar-in{display:flex;align-items:center;gap:14px;padding:15px 0}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:-.02em}
.shell{width:26px;height:26px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum-br));position:relative;box-shadow:inset 0 -2px 4px rgba(0,0,0,.3),0 0 12px rgba(224,161,46,.25)}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.7);transform:translateX(-50%);border-radius:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.merchant-tag{font-family:var(--mono);font-size:11px;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line);padding:5px 10px;border-radius:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── Layout ─── */
.grid{display:grid;grid-template-columns:220px 1fr;gap:18px;padding:18px 0 60px}
@media(max-width:860px){.grid{grid-template-columns:1fr;padding-bottom:84px}.sidebar{display:none}.wrap{padding:0 13px}.content{padding:14px;border-radius:14px}.kpis{grid-template-columns:1fr}.merchant-tag{max-width:120px;font-size:10px}}
@media(max-width:420px){.kpi-tile .kv{font-size:22px}.table th,.table td{padding:8px 9px;font-size:12px}.vhdr h1{font-size:20px}.topbar-in{padding:11px 0}input,select,textarea{font-size:16px!important}}

/* ─── Sidebar ─── */
.sidebar{
  background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px;align-self:start;
  position:sticky;top:72px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(91,44,143,.06) inset;
}
.side-sect{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;padding-left:10px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{padding:9px 10px;border-radius:11px;border:1px solid transparent;color:var(--ink-soft);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:9px;transition:.15s}
.nav a:hover{background:rgba(255,255,255,.06);border-color:var(--line);color:var(--ink)}
.nav a.active{background:rgba(91,44,143,.2);border-color:rgba(91,44,143,.35);color:#C9AEFF;box-shadow:0 0 18px rgba(91,44,143,.15)}
.nav a svg{flex-shrink:0;opacity:.5}
.nav a.active svg{opacity:1}
.nav-sep{height:1px;background:var(--line-2);margin:8px 0}

/* ─── Content ─── */
.content{
  background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:18px;padding:22px;min-height:520px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 40px rgba(0,0,0,.35);
}

/* ─── View header ─── */
.vhdr{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--line-2)}
.vhdr h1{font-family:var(--display);font-weight:800;font-size:24px;letter-spacing:-.02em}
.vhdr p{color:var(--ink-soft);margin-top:5px;font-size:13.5px}
.vhdr-actions{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ─── KPI cards (overview) ─── */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.kpi-tile{
  border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 20px;
  background:rgba(255,255,255,.05);
  transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s,border-color .2s;
  cursor:default;will-change:transform;
  box-shadow:0 4px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);
}
.kpi-tile:hover{border-color:rgba(91,44,143,.45);box-shadow:0 0 0 1px rgba(91,44,143,.2),0 20px 50px rgba(0,0,0,.5),0 0 40px rgba(91,44,143,.12)}
.kpi-tile .kl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.kpi-tile .kv{font-family:var(--display);font-weight:900;font-size:27px;letter-spacing:-.02em;background:linear-gradient(135deg,#fff,rgba(255,255,255,.75));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
.kpi-tile .ks{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* ─── Panel ─── */
.panel{
  border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;
  margin-bottom:16px;background:rgba(255,255,255,.04);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--line-2)}
.panel-head h2{font-family:var(--display);font-weight:800;font-size:14px}
.badge{font-family:var(--mono);font-size:11px;color:var(--ink-soft);padding:4px 9px;border:1px solid var(--line);border-radius:999px;white-space:nowrap;background:rgba(255,255,255,.04)}

/* ─── Table ─── */
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:11px 14px;border-bottom:1px solid var(--line-2);font-size:13.5px;vertical-align:middle}
.table th{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.03);white-space:nowrap}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover{background:rgba(255,255,255,.05)}

/* ─── Tags ─── */
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-family:var(--mono);font-size:10.5px;white-space:nowrap;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tag.ok{border-color:rgba(31,168,119,.4);background:rgba(31,168,119,.12);color:#4DD9A5}.tag.ok .dot{background:var(--mint)}
.tag.pend{border-color:rgba(224,161,46,.4);background:rgba(224,161,46,.12);color:var(--gold)}.tag.pend .dot{background:var(--gold)}
.tag.fail{border-color:rgba(239,106,76,.4);background:rgba(239,106,76,.12);color:#F4956B}.tag.fail .dot{background:var(--coral)}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:10px;padding:8px 13px;border:1px solid var(--line);background:rgba(255,255,255,.05);font-weight:700;font-size:13px;transition:.15s;cursor:pointer;color:var(--ink);white-space:nowrap}
.btn:hover{border-color:rgba(91,44,143,.5);color:#C9AEFF;background:rgba(91,44,143,.12)}
.btn:disabled{opacity:.45;pointer-events:none}
.btn.primary{background:var(--plum);border-color:var(--plum-br);color:#fff;box-shadow:0 4px 18px rgba(91,44,143,.3)}
.btn.primary:hover{background:var(--plum-deep);box-shadow:0 6px 24px rgba(91,44,143,.45)}
.btn.sm{padding:5px 9px;font-size:11.5px;border-radius:8px}

/* ─── Fields ─── */
.field{margin-bottom:13px}
.field .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;outline:none;font-size:13.5px;background:rgba(255,255,255,.06);transition:.15s;color:var(--ink)}
.field select option{background:#1A1535;color:var(--ink)}
.field input::placeholder{color:var(--faint)}
.field input:focus,.field select:focus{border-color:rgba(91,44,143,.55);box-shadow:0 0 0 3px rgba(91,44,143,.15)}
.formrow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:520px){.formrow{grid-template-columns:1fr}}

/* ─── Method tabs (payout) ─── */
.method-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.method-tab{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:10px;padding:10px;font-weight:700;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;cursor:pointer}
.method-tab:hover{border-color:rgba(91,44,143,.35);color:var(--ink)}
.method-tab.on{border-color:rgba(91,44,143,.5);background:rgba(91,44,143,.18);color:#C9AEFF}

/* ─── Key row ─── */
.keyrow{display:flex;gap:8px;align-items:center}
.keyrow input{flex:1;font-family:var(--mono);font-size:12px}
.mono-note{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px}

/* ─── Feedback ─── */
.fb{font-size:13px;margin-top:10px;display:none}
.fb.ok{color:var(--mint);display:block}
.fb.bad{color:var(--coral);display:block}

/* ─── States ─── */
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13.5px}
.empty strong{display:block;color:var(--ink);font-size:15px;margin-bottom:6px}
.spinbox{padding:48px 20px;text-align:center}
.spin{width:36px;height:36px;border:3px solid rgba(91,44,143,.3);border-top-color:var(--plum-br);border-radius:50%;margin:0 auto 12px;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─── Search ─── */
.search-row{margin-bottom:14px}
.search-row input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:10px 13px;outline:none;font-size:13.5px;background:rgba(255,255,255,.06);transition:.15s;color:var(--ink)}
.search-row input::placeholder{color:var(--faint)}
.search-row input:focus{border-color:rgba(91,44,143,.55);box-shadow:0 0 0 3px rgba(91,44,143,.15)}

/* ─── 3D reveal ─── */
.r3d{will-change:transform,opacity;transform:perspective(900px) rotateX(18deg) translateY(30px) scale(.97);opacity:0}
.r3d.in{transform:perspective(900px) rotateX(0) translateY(0) scale(1);opacity:1}

/* ─── Mobile bottom nav ─── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(9,7,26,.96);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid rgba(255,255,255,.09);padding-bottom:env(safe-area-inset-bottom,0px)}
.mob-nav-in{display:flex;align-items:stretch}
.mob-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 8px;color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.03em;text-transform:uppercase;transition:.15s;text-decoration:none}
.mob-nav a.active{color:#C9AEFF}
.mob-nav a svg{opacity:.45;transition:.15s}
.mob-nav a.active svg{opacity:1}
@media(max-width:860px){.mob-nav{display:block}}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.r3d,.r3d.in{transform:none;opacity:1}}
</style>
</head>
<body>

<!-- 3D background -->
<div class="bg-scene" id="bgScene">
  <div class="bg-dots"></div>
  <div class="bg-grid" id="bgGrid"></div>
  <div class="orb orb-1" id="orb1"></div>
  <div class="orb orb-2" id="orb2"></div>
  <div class="orb orb-3" id="orb3"></div>
</div>

<div class="app">
  <div class="topbar" id="topbar">
    <div class="wrap topbar-in">
      <a href="/" class="brand" style="text-decoration:none;color:inherit"><span class="shell"></span>Cowrie</a>
      <div class="topbar-right">
        <div style="position:relative;display:flex;align-items:center">
          <svg style="position:absolute;left:9px;pointer-events:none;opacity:.4" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="globalSearch" type="search" placeholder="Search reference…" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:6px 11px 6px 28px;color:#fff;font-family:var(--mono);font-size:11.5px;width:170px;outline:none;transition:.15s" onfocus="this.style.borderColor='rgba(91,44,143,.55)';this.style.boxShadow='0 0 0 3px rgba(91,44,143,.15)'" onblur="this.style.borderColor='';this.style.boxShadow=''">
        </div>
        <span class="merchant-tag" id="merchantTag">…</span>
        <!-- Mode dropdown -->
        <div style="position:relative" id="modeWrap">
          <button id="modeBtn" style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;color:#fff;transition:.15s;user-select:none">
            <span id="modeDot" style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#E0A12E"></span>
            <span id="modeLabel">TEST</span>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div id="modeDropdown" style="display:none;position:absolute;top:calc(100% + 8px);right:0;background:#1a1035;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;min-width:180px;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:999">
            <div id="ddTest" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:.12s" onmouseenter="this.style.background='rgba(255,255,255,.07)'" onmouseleave="this.style.background=''">
              <span style="width:7px;height:7px;border-radius:50%;background:#E0A12E;flex-shrink:0"></span>
              <div>
                <div style="font-family:var(--mono);font-size:11.5px;font-weight:700;color:#E0A12E">Test mode</div>
                <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:1px">Simulated payments</div>
              </div>
            </div>
            <div id="ddLive" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:.12s" onmouseenter="this.style.background='rgba(255,255,255,.07)'" onmouseleave="this.style.background=''">
              <span style="width:7px;height:7px;border-radius:50%;flex-shrink:0" id="ddLiveDot"></span>
              <div>
                <div style="font-family:var(--mono);font-size:11.5px;font-weight:700" id="ddLiveLabel">Live mode</div>
                <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:1px" id="ddLiveHint">Real payments</div>
              </div>
            </div>
          </div>
        </div>
        <!-- Toast notification -->
        <div id="modeToast" style="display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1035;border:1px solid rgba(239,106,76,.4);border-radius:12px;padding:13px 20px;font-size:13.5px;color:#EF6A4C;z-index:9999;box-shadow:0 12px 36px rgba(0,0,0,.5);display:none;align-items:center;gap:10px;max-width:360px;text-align:center">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6z"/></svg>
          <span>Complete account verification before switching to Live mode.</span>
        </div>
        <button class="btn sm" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </div>

  <div class="wrap grid">
    <aside class="sidebar">
      <div class="side-sect">Menu</div>
      <nav class="nav">
        <a class="active" href="#" data-view="overview">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Overview
        </a>
        <a href="#" data-view="transactions">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          Transactions
        </a>
        <a href="#" data-view="payment-links">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Payment Links
        </a>
        <a href="#" data-view="request-payout">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4Z"/></svg>
          Request Payout
        </a>
        <a href="#" data-view="payout-history">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          My Payout Requests
        </a>

<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const SYMS={GHS:'₵',NGN:'₦',KES:'KSh',ZAR:'R',USD:'$',EUR:'€',GBP:'£'};
const fmt=(n,c='USD')=>(SYMS[c]||c+' ')+' '+(n/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=ts=>new Date(ts).toLocaleString([],{month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'});
const ML={card:'Card',mobile_money:'Mobile money',bank_transfer:'Bank transfer',ussd:'USSD'};

const token=sessionStorage.getItem('cowrie_token');
if(!token) location.href='/login';

/* ── Mode (test / live) ── */
let MODE=localStorage.getItem('cowrie_mode')||'test';
function modeHeaders(){return{'authorization':'Bearer '+token,'x-cowrie-mode':MODE};}

const API={
  _on401(){sessionStorage.removeItem('cowrie_token');location.href='/login';},
  async get(p){const r=await fetch(p,{headers:modeHeaders()});const d=await r.json().catch(()=>({}));if(r.status===401){this._on401();throw new Error(d.message||'Session expired');}if(!r.ok)throw new Error(d.message||'Request failed');return d;},
  async post(p,b){const r=await fetch(p,{method:'POST',headers:{...modeHeaders(),'content-type':'application/json'},body:JSON.stringify(b||{})});const d=await r.json().catch(()=>({}));if(r.status===401){this._on401();throw new Error(d.message||'Session expired');}if(!r.ok)throw new Error(d.message||'Request failed');return d;},
  async put(p,b){const r=await fetch(p,{method:'PUT',headers:{...modeHeaders(),'content-type':'application/json'},body:JSON.stringify(b||{})});const d=await r.json().catch(()=>({}));if(r.status===401){this._on401();throw new Error(d.message||'Session expired');}if(!r.ok)throw new Error(d.message||'Request failed');return d;},
  async delete(p){const r=await fetch(p,{method:'DELETE',headers:modeHeaders()});const d=await r.json().catch(()=>({}));if(r.status===401){this._on401();throw new Error(d.message||'Session expired');}if(!r.ok)throw new Error(d.message||'Request failed');return d;},
};

function statusTag(s){
  if(s==='success')return`<span class="tag ok"><span class="dot"></span>success</span>`;
  if(s==='failed')return`<span class="tag fail"><span class="dot"></span>failed</span>`;
  if(s==='completed')return`<span class="tag ok"><span class="dot"></span>completed</span>`;
  return`<span class="tag pend"><span class="dot"></span>${esc(s)}</span>`;
}

let M=null;

/* ========================= Views ========================= */
const VIEWS={
  'overview':       {title:'Overview',            desc:'A summary of your account activity.'},
  'transactions':   {title:'Transactions',        desc:'All payments collected through your checkout.'},
  'payment-links':  {title:'Payment Links',       desc:'Generate shareable payment links for your customers.'},
  'request-payout': {title:'Request Payout',      desc:'Submit a request to withdraw your collected funds.'},
  'payout-history': {title:'My Payout Requests',  desc:'Track the status of your payout requests.'},
  'webhooks':       {title:'Webhook Deliveries',   desc:'Events delivered to your webhook endpoint.'},
  'api-keys':       {title:'API Keys & Webhook',   desc:'Manage your API keys and configure your webhook.'},
  'verification':   {title:'Account Verification', desc:'Submit your KYC documents to verify your business.'},
};

async function loadView(view){
  const main=$('#main');
  const info=VIEWS[view]||VIEWS['transactions'];
  main.innerHTML=`
    <div class="vhdr">
      <div><h1>${esc(info.title)}</h1><p>${esc(info.desc)}</p></div>
      <div class="vhdr-actions"><button class="btn sm" id="refreshBtn">↻ Refresh</button></div>
    </div>
    <div id="vc"><div class="spinbox"><div class="spin"></div></div></div>`;
  $('#refreshBtn').addEventListener('click',()=>loadView(view));
  const vc=$('#vc');
  try{
    if(view==='overview')             await renderOverview(vc);
    else if(view==='transactions')    await renderTransactions(vc);
    else if(view==='payment-links')   await renderPaymentLinks(vc);
    else if(view==='request-payout')  renderRequestPayout(vc);
    else if(view==='payout-history')  await renderPayoutHistory(vc);
    else if(view==='webhooks')        await renderWebhooks(vc);
    else if(view==='api-keys')        await renderApiKeys(vc);
    else if(view==='verification')    await renderVerification(vc);
    reveal3d(vc);
    initTilt(vc);
  }catch(err){
    if(/unauthorized/i.test(err.message)){sessionStorage.removeItem('cowrie_token');location.href='/login';return;}
    vc.innerHTML=`<div class="empty"><strong>Error</strong>${esc(err.message)}</div>`;
  }
}

/* ─── Overview ─── */
async function renderOverview(el){
  const [{transactions},{payouts},kycRes]=await Promise.all([API.get('/api/transactions'),API.get('/api/payouts'),API.get('/api/kyc').catch(()=>null)]);
  const success=transactions.filter(t=>t.status==='success');
  const failed=transactions.filter(t=>t.status==='failed');
  const pending=transactions.filter(t=>t.status==='pending');
  const ccy='USD';
  const grossCollected=success.reduce((s,t)=>s+(t.amountUsd??t.amount),0);
  const completedPayouts=payouts.filter(p=>p.status==='completed').reduce((s,p)=>s+p.amount,0);
  const collected=Math.max(0,grossCollected-completedPayouts);
  const rate=transactions.length?((success.length/transactions.length)*100).toFixed(1):'0.0';
  const pendingPayout=payouts.filter(p=>p.status==='pending').reduce((s,p)=>s+p.amount,0);
  const kycStatus=kycRes?.kycStatus||'none';

  const kycBanner=kycStatus==='none'?`
    <div class="kyc-banner r3d" style="background:rgba(91,44,143,.13);border:1px solid rgba(91,44,143,.3);border-radius:13px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;cursor:pointer" id="kycBannerBtn">
      <div style="width:38px;height:38px;border-radius:50%;background:rgba(91,44,143,.25);display:grid;place-items:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#C9AEFF" stroke-width="2"><path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6z"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-weight:700;color:#C9AEFF;font-size:13.5px">Verify your account</div>
        <div style="color:rgba(255,255,255,.45);font-size:12.5px;margin-top:2px">Complete KYC to unlock full features and payouts.</div>
      </div>
      <div style="color:#C9AEFF;font-size:13px;font-weight:700">Verify →</div>
    </div>`
  :kycStatus==='pending'?`
    <div style="background:rgba(224,161,46,.1);border:1px solid rgba(224,161,46,.25);border-radius:13px;padding:14px 20px;margin-bottom:18px;font-size:13px;color:#E0A12E;display:flex;align-items:center;gap:10px">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Your KYC is under review — we'll notify you within 1–2 business days.
    </div>`
  :kycStatus==='rejected'?`
    <div class="kyc-banner r3d" style="background:rgba(239,106,76,.1);border:1px solid rgba(239,106,76,.28);border-radius:13px;padding:14px 20px;margin-bottom:18px;font-size:13px;color:var(--coral);display:flex;align-items:center;gap:12px;cursor:pointer" id="kycBannerBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
      <span>Verification rejected — <span style="font-weight:700">Resubmit →</span></span>
    </div>`:
  kycStatus==='approved'?`
    <div style="background:rgba(26,168,119,.08);border:1px solid rgba(26,168,119,.25);border-radius:13px;padding:12px 20px;margin-bottom:18px;font-size:13px;color:#1FA877;display:flex;align-items:center;gap:10px">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      Account verified
    </div>`:'';

  const modeBanner=MODE==='test'?`
    <div style="background:rgba(224,161,46,.1);border:1px solid rgba(224,161,46,.22);border-radius:12px;padding:12px 18px;margin-bottom:14px;font-size:13px;color:#E0A12E;display:flex;align-items:center;gap:10px">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span><strong>Test mode</strong> — Transactions here are simulated and no real money moves. Switch to <strong>Live</strong> in the top bar to process real payments.</span>
    </div>`:'';

  el.innerHTML=`
    ${modeBanner}
    ${kycBanner}
    <div class="kpis">
      <div class="kpi-tile r3d">
        <div class="kl">Available balance</div>
        <div class="kv">${fmt(collected,ccy)}</div>
        <div class="ks">${success.length} payment${success.length!==1?'s':''} · ${fmt(grossCollected,ccy)} gross</div>
      </div>
      <div class="kpi-tile r3d">
        <div class="kl">Success rate</div>
        <div class="kv">${rate}%</div>
        <div class="ks">${transactions.length} total · ${failed.length} failed</div>
      </div>
      <div class="kpi-tile r3d">
        <div class="kl">Pending payments</div>
        <div class="kv">${pending.length}</div>
        <div class="ks">awaiting completion</div>
      </div>
      <div class="kpi-tile r3d">
        <div class="kl">Payout pending</div>
        <div class="kv">${fmt(pendingPayout,'USD')}</div>
        <div class="ks">${payouts.filter(p=>p.status==='pending').length} request${payouts.filter(p=>p.status==='pending').length!==1?'s':''} awaiting</div>
      </div>
    </div>
    ${transactions.length?`
    <div class="panel r3d">
      <div class="panel-head"><h2>Recent transactions</h2><span class="badge">${transactions.length} total</span></div>
      <div style="overflow:auto"><table class="table">
        <thead><tr><th>Reference</th><th>Method</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${txRows(transactions.slice(0,5))}</tbody>
      </table></div>
    </div>`:''}`;

  const kycBtn=document.getElementById('kycBannerBtn');
  if(kycBtn) kycBtn.addEventListener('click',e=>{e.preventDefault();loadView('verification');document.querySelectorAll('.nav a,.mnav').forEach(x=>x.classList.toggle('active',x.dataset.view==='verification'));});
}

/* ─── Transactions ─── */
async function renderTransactions(el){
  const {transactions}=await API.get('/api/transactions');

  if(!transactions.length){
    el.innerHTML=`
      <div class="empty"><strong>No transactions yet</strong>Open <a href="/checkout" style="color:#C9AEFF;font-weight:600">/checkout</a> and complete a test payment to see it here.</div>`;
    return;
  }

  const PAGE=10;
  let page=0;

  function filtered(){
    const q=($('#txSearch')||{}).value;
    if(!q||!q.trim()) return transactions;
    const s=q.toLowerCase().trim();
    return transactions.filter(t=>
      t.reference.toLowerCase().includes(s)||
      (t.method||'').toLowerCase().includes(s)||
      t.status.toLowerCase().includes(s)
    );
  }

  function renderPage(){
    const rows=filtered();
    const total=rows.length;
    const pages=Math.max(1,Math.ceil(total/PAGE));
    if(page>=pages) page=pages-1;
    if(page<0) page=0;
    const slice=rows.slice(page*PAGE,page*PAGE+PAGE);
    const from=total?page*PAGE+1:0;
    const to=Math.min(page*PAGE+PAGE,total);
    $('#txCount').textContent=total?`${from}–${to} of ${total}`:'0';
    $('#txWrap').querySelector('tbody').innerHTML=txRows(slice);
    $('#txPagerInner').innerHTML=`
      <button data-pg="prev" class="btn sm" style="min-width:76px;min-height:36px" ${page===0?'disabled':''}>← Prev</button>
      <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">Page ${page+1} of ${pages}</span>
      <button data-pg="next" class="btn sm" style="min-width:76px;min-height:36px" ${page>=pages-1?'disabled':''}>Next →</button>`;
  }

  el.innerHTML=`
    <div class="search-row" style="display:flex;gap:8px;align-items:center">
      <input id="txSearch" placeholder="Search reference, method, status…" style="flex:1">
      <button id="clearTxBtn" class="btn sm" style="flex-shrink:0;min-height:36px;background:rgba(239,106,76,.12);color:var(--coral,#EF6A4C);border:1px solid rgba(239,106,76,.3);font-family:var(--mono);font-size:11px;white-space:nowrap">Clear history</button>
    </div>
    <div class="panel r3d">
      <div class="panel-head">
        <h2>Transactions</h2>
        <span class="badge" id="txCount">…</span>
      </div>
      <div style="overflow-x:auto"><table class="table" id="txWrap">
        <thead><tr><th>Reference</th><th>Method</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody></tbody>
      </table></div>
      <div id="txPager" style="border-top:1px solid var(--line,rgba(255,255,255,.09))">
        <div id="txPagerInner" style="display:flex;align-items:center;gap:10px;justify-content:center;padding:14px 16px;flex-wrap:wrap"></div>
      </div>
    </div>

    <div id="clearModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px">
      <div style="background:#1C1335;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:32px 24px;max-width:360px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.5)">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(239,106,76,.15);border:1.5px solid rgba(239,106,76,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#EF6A4C" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </div>
        <h3 style="text-align:center;font-size:17px;margin-bottom:8px;font-family:var(--display)">Clear transaction history?</h3>
        <p style="text-align:center;color:var(--muted,#888);font-size:13px;line-height:1.6;margin-bottom:20px">Choose what to delete. This cannot be undone.</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button id="clearAllBtn" style="padding:12px;border-radius:10px;border:1px solid rgba(239,106,76,.5);background:rgba(239,106,76,.2);color:#fff;font-family:var(--display);font-weight:700;font-size:14px;cursor:pointer">Delete all transactions</button>
          <button id="clearCancelBtn" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;margin-top:4px">Cancel</button>
        </div>
      </div>
    </div>`;

  renderPage();

  $('#txPager').addEventListener('click',e=>{
    const btn=e.target.closest('[data-pg]');
    if(!btn||btn.disabled) return;
    if(btn.dataset.pg==='prev') page--;
    if(btn.dataset.pg==='next') page++;
    renderPage();
  });

  $('#txSearch').addEventListener('input',()=>{ page=0; renderPage(); });

  if(_pendingSearch){
    $('#txSearch').value = _pendingSearch;
    _pendingSearch = '';
    page = 0;
    renderPage();
    $('#txSearch').focus();
  }

  const modal=$('#clearModal');
  $('#clearTxBtn').addEventListener('click',()=>{ modal.style.display='flex'; });
  $('#clearCancelBtn').addEventListener('click',()=>{ modal.style.display='none'; });
  modal.addEventListener('click',e=>{ if(e.target===modal) modal.style.display='none'; });
  $('#clearAllBtn').addEventListener('click',async()=>{
    modal.style.display='none';
    await API.delete('/api/transactions');
    document.querySelectorAll('.nav a,.mnav').forEach(x=>x.classList.toggle('active',x.dataset.view==='overview'));
    loadView('overview');
  });
}

function txRows(list){
  if(!list.length)return`<tr><td colspan="5"><div class="empty">No results</div></td></tr>`;
  return list.map(t=>`<tr>
    <td style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">${esc(t.reference)}</td>
    <td>${esc(ML[t.method]||t.method||'—')}</td>
    <td style="font-family:var(--mono);font-weight:700">${fmt(t.amount,t.currency)}</td>
    <td>${statusTag(t.status)}</td>
    <td style="font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap">${fmtDate(t.createdAt)}</td>
  </tr>`).join('');
}

          </div>
        </div>

    wrap.style.opacity=this.checked?'0.35':'1';
    wrap.style.pointerEvents=this.checked?'none':'';

  });

    const openAmount=document.getElementById('plOpenAmount').checked;
    const amt=Number(document.getElementById('plAmt').value);
    if(!openAmount&&(!amt||amt<=0)){errEl.textContent='Enter a valid amount, or tick "Customer enters their own amount".';errEl.style.display='block';return;}
    const btn=document.getElementById('plGen');
    btn.disabled=true; btn.textContent='Generating…';
    try{
      const {charge,checkoutUrl}=await API.post('/api/payment-links',{
        amount: amt,
        currency: document.getElementById('plCcy').value,
        description: document.getElementById('plDesc').value.trim(),
        openAmount,
      });
      document.getElementById('plUrl').textContent=checkoutUrl;
      result.style.display='block';

      links.unshift(charge);
      document.getElementById('plTable').innerHTML=plLinksTable(links);
      document.getElementById('plBadge').textContent=links.length+' total';
    }catch(e){
      errEl.textContent=e.message; errEl.style.display='block';
    }finally{
      btn.disabled=false; btn.textContent='Generate link';
    }
  });
}

function plLinksTable(rows){
  if(!rows.length)return`<div class="empty-state" style="padding:28px 20px;text-align:center;color:var(--muted)">No payment links yet. Generate one above.</div>`;
  return`<div style="overflow:auto"><table class="table"><thead><tr>
    <th>Amount</th><th>Description</th><th>Status</th><th>Created</th><th></th>
  </tr></thead><tbody>${rows.map(r=>{
    const url=location.origin+'/checkout?reference='+esc(r.reference);
    const desc=(r.metadata&&r.metadata.description)||'—';
    return`<tr>
      <td style="font-family:var(--mono);font-weight:700">${fmt(r.amount,r.currency)}</td>
      <td style="color:var(--ink-soft)">${esc(desc)}</td>
      <td>${statusTag(r.status)}</td>
      <td style="font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap">${fmtDate(r.createdAt)}</td>

    </tr>`;
  }).join('')}</tbody></table></div>`;
}

/* ─── Webhook Deliveries ─── */
async function renderWebhooks(el){
  const {events}=await API.get('/api/events');
  if(!events.length){el.innerHTML=`<div class="empty"><strong>No webhook events yet</strong>Events appear here once a payment completes and Cowrie delivers it to your endpoint.</div>`;return;}

  const PAGE=10;
  let page=0;

  function whRows(slice){
    return slice.map(e=>{
      const statusCell=e.status==='delivered'
        ?statusTag('success')
        :e.status==='skipped'
          ?`<span class="tag pend"><span class="dot"></span>skipped</span>`
          :e.status==='timeout'
            ?`<span class="tag pend" style="background:rgba(224,161,46,.13);color:#E0A12E;border-color:rgba(224,161,46,.25)"><span class="dot" style="background:#E0A12E"></span>timeout</span>`
            :statusTag('failed');
      const detail=e.responseCode?esc(String(e.responseCode)):e.error?`<span style="color:var(--muted);font-size:11px">${esc(e.error)}</span>`:'—';
      return`<tr>
        <td style="font-family:var(--mono);font-size:12px">${esc(e.type)}</td>
        <td style="font-family:var(--mono);font-size:12px">${esc(e.chargeReference)}</td>
        <td>${statusCell}</td>
        <td style="font-family:var(--mono);font-size:12px">${detail}</td>
        <td style="font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap">${fmtDate(e.createdAt)}</td>
      </tr>`;
    }).join('');
  }

  function renderPage(){
    const total=events.length;
    const pages=Math.max(1,Math.ceil(total/PAGE));
    if(page>=pages) page=pages-1;
    if(page<0) page=0;
    const slice=events.slice(page*PAGE,page*PAGE+PAGE);
    const from=page*PAGE+1;
    const to=Math.min(page*PAGE+PAGE,total);
    $('#whCount').textContent=`${from}–${to} of ${total}`;
    $('#whWrap').querySelector('tbody').innerHTML=whRows(slice);
    $('#whPagerInner').innerHTML=`
      <button data-pg="prev" class="btn sm" style="min-width:76px;min-height:36px" ${page===0?'disabled':''}>← Prev</button>
      <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">Page ${page+1} of ${pages}</span>
      <button data-pg="next" class="btn sm" style="min-width:76px;min-height:36px" ${page>=pages-1?'disabled':''}>Next →</button>`;
  }

  el.innerHTML=`<div class="panel r3d">
    <div class="panel-head"><h2>Webhook deliveries</h2><span class="badge" id="whCount">…</span></div>
    <div style="overflow-x:auto"><table class="table" id="whWrap">
      <thead><tr><th>Event</th><th>Charge</th><th>Status</th><th>Response</th><th>Time</th></tr></thead>
      <tbody></tbody>
    </table></div>
    <div id="whPager" style="border-top:1px solid var(--line,rgba(255,255,255,.09))">
      <div id="whPagerInner" style="display:flex;align-items:center;gap:10px;justify-content:center;padding:14px 16px;flex-wrap:wrap"></div>
    </div>
  </div>`;

  renderPage();

  $('#whPager').addEventListener('click',e=>{
    const btn=e.target.closest('[data-pg]');
    if(!btn||btn.disabled) return;
    if(btn.dataset.pg==='prev') page--;
    if(btn.dataset.pg==='next') page++;
    renderPage();
  });
}

    el.innerHTML=`<div class="panel r3d" style="padding:32px;text-align:center">
      <div style="width:60px;height:60px;border-radius:50%;background:rgba(26,168,119,.18);border:1px solid rgba(26,168,119,.35);display:grid;place-items:center;margin:0 auto 18px;color:#1FA877">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h2 style="font-size:20px;font-weight:800;color:var(--ink)">Account verified</h2>
      <p style="color:var(--muted);margin-top:8px;font-size:14px">Your business has been verified. You have full access to all Cowrie features.</p>
    </div>`;
    return;
  }

  if(kycStatus==='pending'){
    el.innerHTML=`<div class="panel r3d" style="padding:32px;text-align:center">
      <div style="width:60px;height:60px;border-radius:50%;background:rgba(224,161,46,.15);border:1px solid rgba(224,161,46,.3);display:grid;place-items:center;margin:0 auto 18px;color:#E0A12E">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      </div>
      <h2 style="font-size:20px;font-weight:800;color:var(--ink)">Verification pending</h2>
      <p style="color:var(--muted);margin-top:8px;font-size:14px">Your documents are under review. We'll update your status within 1–2 business days.</p>
    </div>`;
    return;
  }

  kycFiles.idFront=null; kycFiles.idBack=null; kycFiles.certificate=null;

  const rejectedBanner=kycStatus==='rejected'?`
    <div style="background:rgba(239,106,76,.12);border:1px solid rgba(239,106,76,.3);border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:13.5px;color:var(--coral)">
      <strong>Verification rejected</strong> — ${esc(kycRejectionReason||'Your submission did not meet our requirements.')} Please correct the details and resubmit.
    </div>`:'';

  const STEPS=[
    {label:'Personal info'},
    {label:'Business info'},
    {label:'Documents'},
  ];
  let kycStep=0;

  function stepDots(){
    return `<div style="display:flex;align-items:center;gap:0;margin-bottom:22px">
      ${STEPS.map((s,i)=>`
        <div style="display:flex;align-items:center;flex:${i<STEPS.length-1?1:'none'}">
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0">
            <div style="width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;border:2px solid;transition:.2s;
              ${i<kycStep?'background:#1FA877;border-color:#1FA877;color:#fff':i===kycStep?'background:var(--plum);border-color:var(--plum-br);color:#fff':'background:transparent;border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.35)'}">
              ${i<kycStep?'✓':i+1}
            </div>
            <div style="font-size:10px;font-family:var(--mono);white-space:nowrap;color:${i===kycStep?'var(--ink)':'rgba(255,255,255,.35)'};">${s.label}</div>
          </div>
          ${i<STEPS.length-1?`<div style="flex:1;height:2px;margin:0 6px;margin-bottom:16px;background:${i<kycStep?'#1FA877':'rgba(255,255,255,.1)'};border-radius:2px"></div>`:''}
        </div>`).join('')}
    </div>`;
  }

  function stepContent(){
    if(kycStep===0) return `
      <div class="field"><div class="lbl">Full name (account owner / director)</div>
        <input id="kFullName" placeholder="e.g. Kwame Mensah" value="${esc(_kycDraft.fullName)}">
      </div>
      <div class="field"><div class="lbl">Phone number</div>
        <input id="kPhone" placeholder="e.g. 0241234567" value="${esc(_kycDraft.phone)}">
      </div>
      <div class="field"><div class="lbl">ID type</div>
        <select id="kIdType">
          <option value="">Select ID type</option>
          ${['Ghana Card','Passport','Driver\'s License','Voter\'s ID'].map(t=>`<option${_kycDraft.idType===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="field"><div class="lbl">ID number</div>
        <input id="kIdNumber" placeholder="e.g. GHA-123456789-0" value="${esc(_kycDraft.idNumber)}">
      </div>`;
    if(kycStep===1) return `
      <div class="field"><div class="lbl">Business type</div>
        <select id="kBizType">
          <option value="individual"${_kycDraft.businessType==='individual'?' selected':''}>Individual / Sole proprietor</option>
          <option value="company"${_kycDraft.businessType==='company'?' selected':''}>Registered company</option>
        </select>
      </div>
      <div class="field"><div class="lbl">Business registration number</div>
        <input id="kRegNum" placeholder="e.g. CS-12345" value="${esc(_kycDraft.businessRegNumber)}">
      </div>
      <div class="field"><div class="lbl">Business address</div>
        <input id="kAddress" placeholder="e.g. 12 Cantonments Road, Accra, Ghana" value="${esc(_kycDraft.address)}">
      </div>`;
    return `
      <div style="margin-bottom:16px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.38)">ID Documents</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${kycUploadZone('idFront','ID — front side','Tap to choose or drag photo')}
        ${kycUploadZone('idBack','ID — back side','Tap to choose or drag photo')}
      </div>
      <div style="margin:20px 0 8px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.38)">Business Document</div>
      ${kycUploadZone('certificate','Business certificate / registration','Certificate of incorporation, business registration or equivalent',true)}`;
  }

  function stepNav(){
    const isLast=kycStep===STEPS.length-1;
    return `<div style="display:flex;gap:10px;margin-top:20px;align-items:center">
      ${kycStep>0?`<button id="kycBack" class="btn sm" style="min-height:42px;min-width:80px">← Back</button>`:''}
      <div style="flex:1"></div>
      <div class="fb" id="kycFb" style="flex:1;text-align:right"></div>
      ${isLast
        ?`<button id="kycSubmit" class="btn primary" style="min-height:42px;min-width:120px">Submit →</button>`
        :`<button id="kycNext" class="btn primary" style="min-height:42px;min-width:80px">Next →</button>`}
    </div>`;
  }

  function renderStep(){
    el.innerHTML=`${kycStep===0?rejectedBanner:''}
      <div class="panel r3d">
        <div class="panel-head"><h2>Business verification</h2><span class="badge">Step ${kycStep+1} of ${STEPS.length}</span></div>
        <div style="padding:18px">
          ${stepDots()}
          ${stepContent()}
          ${stepNav()}
        </div>
      </div>`;

    if(kycStep===2){
      /* Wire up file inputs on documents step */
      ['idFront','idBack','certificate'].forEach(key=>{
        const input=document.getElementById(`fi-${key}`);
        const camInput=document.getElementById(`cam-fi-${key}`);
        const camBtn=document.getElementById(`cam-btn-${key}`);
        const zone=document.getElementById(`uz-${key}`);
        const preview=document.getElementById(`up-preview-${key}`);
        const placeholder=document.getElementById(`up-placeholder-${key}`);

        const markDone=()=>{
          zone.style.borderColor='rgba(91,44,143,.55)';
          zone.style.background='rgba(91,44,143,.08)';
          if(camBtn)camBtn.style.background='rgba(91,44,143,.15)';
        };

        const loadFile=file=>{
          if(!file)return;
          if(file.size>5*1024*1024){
            document.getElementById('kycFb').textContent=`${file.name} exceeds 5 MB.`;
            document.getElementById('kycFb').className='fb bad';return;
          }
          const reader=new FileReader();
          reader.onload=ev=>{
            kycFiles[key]=ev.target.result;
            const isPdf=file.type==='application/pdf';
            preview.style.display='block';
            placeholder.style.display='none';
            preview.innerHTML=isPdf
              ?`<div style="padding:10px;font-size:12px;color:#C9AEFF">📄 ${esc(file.name)}</div>`
              :`<img src="${ev.target.result}" style="max-height:90px;max-width:100%;border-radius:7px;object-fit:contain"><div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:5px">${esc(file.name)}</div>`;
            if(kycFiles[key]) markDone();
          };
          reader.readAsDataURL(file);
        };

        input.addEventListener('change',()=>loadFile(input.files[0]));
        camInput.addEventListener('change',()=>loadFile(camInput.files[0]));
        if(isMobileDevice&&camBtn){camBtn.style.display='flex';camBtn.addEventListener('click',()=>camInput.click());}
        zone.addEventListener('dragover',e=>{e.preventDefault();zone.style.borderColor='rgba(139,92,246,.6)';});
        zone.addEventListener('dragleave',()=>zone.style.borderColor='');
        zone.addEventListener('drop',e=>{e.preventDefault();zone.style.borderColor='';const f=e.dataTransfer.files[0];if(f)loadFile(f);});

        /* Restore preview if file already chosen */
        if(kycFiles[key]){
          preview.style.display='block';placeholder.style.display='none';
          const isPdf=kycFiles[key].startsWith('data:application/pdf');
          preview.innerHTML=isPdf
            ?`<div style="padding:10px;font-size:12px;color:#C9AEFF">📄 File uploaded</div>`
            :`<img src="${kycFiles[key]}" style="max-height:90px;max-width:100%;border-radius:7px;object-fit:contain">`;
          markDone();
        }
      });

      document.getElementById('kycSubmit').addEventListener('click',async()=>{
        const fb=document.getElementById('kycFb');fb.className='fb';
        if(!kycFiles.idFront||!kycFiles.idBack){fb.textContent='Please upload both the front and back of your ID.';fb.className='fb bad';return;}
        if(!kycFiles.certificate){fb.textContent='Please upload your business certificate or registration document.';fb.className='fb bad';return;}
        try{
          const btn=document.getElementById('kycSubmit');
          btn.disabled=true;btn.textContent='Uploading…';
          await API.post('/api/kyc',{
            fullName:_kycDraft.fullName,phone:_kycDraft.phone,idType:_kycDraft.idType,idNumber:_kycDraft.idNumber,
            businessType:_kycDraft.businessType,businessRegNumber:_kycDraft.businessRegNumber,address:_kycDraft.address,
            idFront:kycFiles.idFront,idBack:kycFiles.idBack,certificate:kycFiles.certificate,
          });
          fb.textContent='Submitted! We\'ll review your documents within 1–2 business days.';fb.className='fb ok';
          setTimeout(()=>loadView('verification'),1800);
        }catch(err){
          const btn=document.getElementById('kycSubmit');
          btn.disabled=false;btn.textContent='Submit →';
          fb.textContent=err.message;fb.className='fb bad';
        }
      });
    }

    const backBtn=document.getElementById('kycBack');
    const nextBtn=document.getElementById('kycNext');

    if(backBtn) backBtn.addEventListener('click',()=>{kycStep--;renderStep();});
    if(nextBtn) nextBtn.addEventListener('click',()=>{
      const fb=document.getElementById('kycFb');fb.className='fb';
      if(kycStep===0){
        const fn=document.getElementById('kFullName').value.trim();
        const ph=document.getElementById('kPhone').value.trim();
        const it=document.getElementById('kIdType').value;
        const inum=document.getElementById('kIdNumber').value.trim();
        if(!fn||!ph||!it||!inum){fb.textContent='Please fill in all fields before continuing.';fb.className='fb bad';return;}
        _kycDraft={..._kycDraft,fullName:fn,phone:ph,idType:it,idNumber:inum};
      }
      if(kycStep===1){
        const bt=document.getElementById('kBizType').value;
        const rn=document.getElementById('kRegNum').value.trim();
        const addr=document.getElementById('kAddress').value.trim();
        if(!addr){fb.textContent='Please enter your business address.';fb.className='fb bad';return;}
        _kycDraft={..._kycDraft,businessType:bt,businessRegNumber:rn,address:addr};
      }
      kycStep++;renderStep();
    });

    reveal3d(el);
  }

  let _kycDraft={
    fullName:kycData?.fullName||'',
    phone:kycData?.phone||'',
    idType:kycData?.idType||'',
    idNumber:kycData?.idNumber||'',
    businessType:kycData?.businessType||'individual',
    businessRegNumber:kycData?.businessRegNumber||'',
    address:kycData?.address||'',
  };
  renderStep();
}

/* ========================= 3D Effects ========================= */

function reveal3d(container){
  const items=container.querySelectorAll('.r3d');
  items.forEach((el,i)=>{
    el.style.transition='none';
    el.classList.remove('in');
    void el.offsetHeight;
    el.style.transition=`opacity .6s ${i*80}ms ease, transform .65s ${i*80}ms cubic-bezier(.2,.8,.2,1)`;
    requestAnimationFrame(()=>el.classList.add('in'));
  });
}

function initTilt(container){
  container.querySelectorAll('.kpi-tile').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-.5)*2;
      const y=((e.clientY-r.top)/r.height-.5)*2;
      card.style.transform=`perspective(500px) rotateX(${-y*11}deg) rotateY(${x*11}deg) translateZ(10px) scale(1.02)`;
      card.style.borderColor=`rgba(91,44,143,${.3+Math.abs(x+y)*.15})`;
      card.style.boxShadow=`${-x*10}px ${-y*10}px 35px rgba(91,44,143,.3), 0 22px 55px rgba(0,0,0,.5)`;
    });
    card.addEventListener('mouseleave',()=>{
      card.style.transition='transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s, border-color .3s';
      card.style.transform='';card.style.boxShadow='';card.style.borderColor='';
      setTimeout(()=>{card.style.transition='';},500);
    });
  });
}

/* Scroll parallax */
let scrollTick=false;
const bgGrid=document.getElementById('bgGrid');
window.addEventListener('scroll',()=>{
  if(scrollTick)return;
  scrollTick=true;
  requestAnimationFrame(()=>{
    const sy=window.scrollY;
    if(bgGrid)bgGrid.style.backgroundPositionY=(sy*.18)+'px';
    const o1=document.getElementById('orb1'),o2=document.getElementById('orb2'),o3=document.getElementById('orb3');
    if(o1)o1.style.transform=`translateY(${sy*.07}px)`;
    if(o2)o2.style.transform=`translateY(${-sy*.05}px)`;
    if(o3)o3.style.transform=`translate(-50%,-50%) translateY(${sy*.04}px)`;
    document.getElementById('topbar').classList.toggle('stuck',sy>8);
    scrollTick=false;
  });
},{passive:true});

/* ========================= Mode dropdown ========================= */
let KYC_APPROVED=false;
let modeDropOpen=false;

function applyMode(){
  const isLive=MODE==='live';
  const dot=document.getElementById('modeDot');
  const label=document.getElementById('modeLabel');
  if(dot)dot.style.background=isLive?'#1FA877':'#E0A12E';
  if(label)label.textContent=isLive?'LIVE':'TEST';
}

function updateDropdownLiveState(){
  const dot=document.getElementById('ddLiveDot');
  const lbl=document.getElementById('ddLiveLabel');
  const hint=document.getElementById('ddLiveHint');
  if(!dot)return;
  if(KYC_APPROVED){
    dot.style.background='#1FA877';
    lbl.style.color='#1FA877';
    if(hint)hint.textContent='Real payments';
  }else{
    dot.style.background='rgba(255,255,255,.2)';
    lbl.style.color='rgba(255,255,255,.3)';
    if(hint)hint.textContent='Requires account verification';
  }
}

function openModeDropdown(){
  const dd=document.getElementById('modeDropdown');
  if(!dd)return;
  /* mark active item */
  document.getElementById('ddTest').style.background=MODE==='test'?'rgba(224,161,46,.1)':'';
  document.getElementById('ddLive').style.background=MODE==='live'?'rgba(26,168,119,.1)':'';
  updateDropdownLiveState();
  dd.style.display='block';
  modeDropOpen=true;
}
function closeModeDropdown(){
  const dd=document.getElementById('modeDropdown');
  if(dd)dd.style.display='none';
  modeDropOpen=false;
}

function switchMode(m){
  closeModeDropdown();
  if(m===MODE)return;
  MODE=m;
  localStorage.setItem('cowrie_mode',MODE);
  applyMode();
  const current=document.querySelector('.nav a.active,[data-view].active');
  loadView(current?current.dataset.view:'overview');
}

function showModeToast(msg){
  const t=document.getElementById('modeToast');
  if(!t)return;
  t.querySelector('span').textContent=msg;
  t.style.display='flex';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.style.display='none',3500);
}

let _pendingSearch = '';
function doGlobalSearch(q){
  q = q.trim();
  if(!q) return;
  const onTxns = document.querySelector('.nav a[data-view="transactions"],.mnav[data-view="transactions"]');
  if(onTxns && onTxns.classList.contains('active')){
    const el = document.getElementById('txSearch');
    if(el){ el.value = q; el.dispatchEvent(new Event('input')); el.focus(); }
  } else {
    _pendingSearch = q;
    loadView('transactions');
  }
}
document.getElementById('globalSearch').addEventListener('keydown', e=>{
  if(e.key === 'Enter') doGlobalSearch(e.target.value);
});

document.getElementById('modeBtn').addEventListener('click',e=>{
  e.stopPropagation();
  modeDropOpen?closeModeDropdown():openModeDropdown();
});
document.getElementById('ddTest').addEventListener('click',()=>switchMode('test'));
document.getElementById('ddLive').addEventListener('click',()=>{
  if(!KYC_APPROVED){
    closeModeDropdown();
    showModeToast('Complete account verification before switching to Live mode.');
    return;
  }
  switchMode('live');
});
document.addEventListener('click',e=>{
  if(modeDropOpen&&!document.getElementById('modeWrap').contains(e.target))closeModeDropdown();
});

/* ========================= Boot & Nav ========================= */
async function boot(){
  applyMode();
  try{
    const {merchant}=await API.get('/api/me');
    M=merchant;
    document.getElementById('merchantTag').textContent=merchant.businessName;
    KYC_APPROVED=merchant.kycStatus==='approved';
    /* If somehow in live mode but KYC not approved, drop back to test */
    if(MODE==='live'&&!KYC_APPROVED){
      MODE='test';
      localStorage.setItem('cowrie_mode','test');
      applyMode();
    }
    if(!KYC_APPROVED){
      const link=document.getElementById('kycNavLink');
      if(link){
        const dot=document.createElement('span');
        dot.style.cssText='width:7px;height:7px;background:#EF6A4C;border-radius:50%;margin-left:auto;flex-shrink:0';
        link.appendChild(dot);
      }
    }
  }catch(err){
    if(/unauthorized/i.test(err.message)){sessionStorage.removeItem('cowrie_token');location.href='/login';return;}
  }
  loadView('overview');
}

document.querySelectorAll('.nav a[data-view],.mnav').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const v=a.dataset.view;
    document.querySelectorAll('.nav a,.mnav').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll(`[data-view="${v}"]`).forEach(x=>x.classList.add('active'));
    loadView(v);
  });
});

document.getElementById('logoutBtn').addEventListener('click',()=>{
  sessionStorage.removeItem('cowrie_token');
  location.href='/login';
});

boot();
</script>
