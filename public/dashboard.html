<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#F7F5F0; --ivory-2:#FBFAF6; --white:#FFFFFF;
  --ink:#1B1330; --ink-soft:#564E68; --muted:#7A7388; --faint:#A39CB0;
  --line:#E8E3DA; --line-2:#EFEBE3;
  --plum:#5B2C8F; --plum-deep:#3A1A60; --plum-tint:#EFE6F7;
  --gold:#E0A12E; --gold-deep:#B8801C; --gold-tint:#F8EFD9;
  --mint:#1FA877; --mint-tint:#DCF1E9; --coral:#EF6A4C; --coral-tint:#FBE7E1;
  --display:'Plus Jakarta Sans',sans-serif; --body:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ivory);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh}
a{color:inherit;text-decoration:none} button{font-family:inherit;cursor:pointer}
.wrap{max-width:1100px;margin:0 auto;padding:0 18px}
.topbar{position:sticky;top:0;z-index:40;background:rgba(247,245,240,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar-in{display:flex;align-items:center;gap:14px;padding:16px 0}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:-.02em}
.shell{width:26px;height:26px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum));position:relative;box-shadow:inset 0 -2px 4px rgba(0,0,0,.2)}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.6);transform:translateX(-50%);border-radius:2px}
.nav-r{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:11px;padding:9px 13px;border:1.5px solid var(--line);background:var(--white);font-weight:700;font-size:13.5px}
.btn:hover{border-color:var(--plum);color:var(--plum)}
.btn.primary{background:var(--plum);border-color:var(--plum);color:#fff}.btn.primary:hover{background:var(--plum-deep);color:#fff}
.content{padding:24px 0 60px}
.hdr{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.hdr h1{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em}
.hdr p{color:var(--ink-soft);font-size:14px;margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{border:1px solid var(--line);border-radius:16px;padding:14px 14px;background:var(--white)}
.kpi .l{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
.kpi .v{font-family:var(--display);font-weight:900;font-size:24px;margin-top:6px;letter-spacing:-.02em}
.panel{background:var(--white);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:18px}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--ivory-2);border-bottom:1px solid var(--line)}
.panel-head h2{font-family:var(--display);font-weight:800;font-size:15px}
.panel-body{padding:14px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:11px 14px;border-bottom:1px solid var(--line-2);font-size:13.5px;text-align:left}
.table th{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--ivory-2)}
.table tr:last-child td{border-bottom:none}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13.5px}
.tag{display:inline-flex;align-items:center;gap:7px;padding:5px 9px;border-radius:999px;border:1px solid var(--line);font-family:var(--mono);font-size:10.5px}
.dot{width:8px;height:8px;border-radius:50%}
.tag.ok{border-color:rgba(31,168,119,.25);background:rgba(31,168,119,.08);color:var(--mint)}.tag.ok .dot{background:var(--mint)}
.tag.pend{border-color:rgba(224,161,46,.25);background:rgba(224,161,46,.08);color:var(--gold-deep)}.tag.pend .dot{background:var(--gold-deep)}
.tag.bad{border-color:rgba(239,106,76,.25);background:rgba(239,106,76,.08);color:var(--coral)}.tag.bad .dot{background:var(--coral)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--ink-soft)}
.field input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none}
.field input:focus{border-color:var(--plum);box-shadow:0 0 0 4px var(--plum-tint)}
.keyrow{display:flex;align-items:center;gap:8px}
.keyrow input{flex:1}
.muted-note{font-size:12px;color:var(--muted);margin-top:6px}
.save-msg{font-size:12.5px;margin-top:8px;display:none}
.save-msg.ok{color:var(--mint);display:block}
.save-msg.bad{color:var(--coral);display:block}
.loading-state{padding:60px 0;text-align:center;color:var(--muted)}
</style>
</head>
<body>
  <div class="topbar"><div class="wrap topbar-in">
    <div class="brand"><span class="shell"></span>Cowrie</div>
    <div class="nav-r">
      <span id="merchName" style="font-size:13.5px;color:var(--ink-soft);font-weight:600;"></span>
      <a href="/checkout" class="btn">Checkout demo</a>
      <button class="btn" id="logoutBtn">Sign out</button>
    </div>
  </div></div>

  <div class="wrap content" id="app">
    <div class="loading-state">Loading dashboard…</div>
  </div>

<script>
const $=s=>document.querySelector(s);
const token=localStorage.getItem('cowrie_token');
if(!token) location.href='/login';

const API={
  async get(path){const r=await fetch(path,{headers:{authorization:'Bearer '+token}});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;},
  async put(path,body){const r=await fetch(path,{method:'PUT',headers:{'content-type':'application/json',authorization:'Bearer '+token},body:JSON.stringify(body||{})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;},
  async post(path,body){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json',authorization:'Bearer '+token},body:JSON.stringify(body||{})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;}
};

const SYMS={GHS:'₵',NGN:'₦',KES:'KSh',ZAR:'R',USD:'$',EUR:'€',GBP:'£'};
const fmt=(minor,c)=>(SYMS[c]||(c+' '))+' '+(minor/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));

document.getElementById('logoutBtn').addEventListener('click',()=>{
  localStorage.removeItem('cowrie_token');localStorage.removeItem('cowrie_merchant');location.href='/login';
});

function statusTag(status){
  if(status==='success')return `<span class="tag ok"><span class="dot"></span>success</span>`;
  if(status==='failed')return `<span class="tag bad"><span class="dot"></span>failed</span>`;
  return `<span class="tag pend"><span class="dot"></span>${esc(status)}</span>`;
}
const METHOD_LABEL={card:'Card',mobile_money:'Mobile money',bank_transfer:'Bank transfer',ussd:'USSD'};

async function boot(){
  let merchant, transactions, events, payouts;
  try{
    [{merchant},{transactions},{events},{payouts}]=await Promise.all([
      API.get('/api/me'),API.get('/api/transactions'),API.get('/api/events'),API.get('/api/payouts')
    ]);
  }catch(err){
    if(/unauthorized/i.test(err.message)){ localStorage.removeItem('cowrie_token'); location.href='/login'; return; }
    $('#app').innerHTML=`<div class="empty">Couldn't load dashboard: ${esc(err.message)}</div>`;
    return;
  }
  document.getElementById('merchName').textContent=merchant.businessName;
  render(merchant, transactions, events, payouts);
}

function render(merchant, transactions, events, payouts){
  const success=transactions.filter(t=>t.status==='success');
  const failed=transactions.filter(t=>t.status==='failed');
  const pending=transactions.length-success.length-failed.length;
  const ccy=(success[0]||transactions[0]||{}).currency||'GHS';
  const collected=success.reduce((s,t)=>s+t.amount,0);
  const rate=transactions.length?Math.round((success.length/transactions.length)*1000)/10:0;

  $('#app').innerHTML=`
    <div class="hdr"><div>
      <h1>Welcome back, ${esc(merchant.businessName)}</h1>
      <p>Live data from your charges — pay through <a href="/checkout" style="color:var(--plum);font-weight:600;">/checkout</a> to see it land here.</p>
    </div></div>

    <section class="kpis">
      <div class="kpi"><div class="l">Collected</div><div class="v">${fmt(collected,ccy)}</div></div>
      <div class="kpi"><div class="l">Successful</div><div class="v">${success.length}</div></div>
      <div class="kpi"><div class="l">Success rate</div><div class="v">${rate}%</div></div>
      <div class="kpi"><div class="l">Pending</div><div class="v">${pending}</div></div>
    </section>

    <div class="panel">
      <div class="panel-head"><h2>Transactions</h2><span class="muted-note">${transactions.length} total</span></div>
      ${transactions.length?`<div style="overflow:auto;"><table class="table"><thead><tr>
        <th>Reference</th><th>Method</th><th>Amount</th><th>Status</th><th>Created</th>
      </tr></thead><tbody>
        ${transactions.map(t=>`<tr>
          <td style="font-family:var(--mono);font-size:12px;">${esc(t.reference)}</td>
          <td>${esc(METHOD_LABEL[t.method]||t.method||'—')}</td>
          <td style="font-family:var(--mono);font-weight:700;">${fmt(t.amount,t.currency)}</td>
          <td>${statusTag(t.status)}</td>
          <td style="font-family:var(--mono);font-size:11.5px;color:var(--muted);">${new Date(t.createdAt).toLocaleString([], {month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        </tr>`).join('')}
      </tbody></table></div>`:`<div class="empty">No transactions yet. Open <a href="/checkout" style="color:var(--plum);font-weight:600;">/checkout</a> and pay with the test card to see one appear.</div>`}
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Request Payout</h2></div>
      <div class="panel-body" id="payoutForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <button class="btn primary" id="pyMethodBank" data-m="bank">🏦 Bank transfer</button>
          <button class="btn" id="pyMethodMomo" data-m="mobile_money">📱 Mobile money</button>
        </div>
        <input type="hidden" id="pyMethod" value="bank">
        <div id="pyBankFields">
          <div class="field"><label>Bank name</label><input id="pyBank" placeholder="e.g. GCB Bank"></div>
          <div class="field"><label>Account number</label><input id="pyAccountNumber" class="mono" placeholder="e.g. 1234567890"></div>
          <div class="field"><label>Account name</label><input id="pyAccountName" placeholder="Full name on account"></div>
        </div>
        <div id="pyMomoFields" style="display:none">
          <div class="field"><label>Provider</label>
            <select id="pyMobileProvider" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none;background:var(--white)">
              <option value="MTN">MTN Mobile Money</option>
              <option value="Vodafone">Vodafone Cash</option>
              <option value="AirtelTigo">AirtelTigo Money</option>
            </select>
          </div>
          <div class="field"><label>Mobile money number</label><input id="pyMobileNumber" class="mono" placeholder="024 123 4567"></div>
        </div>
        <div class="field"><label>Amount (GHS)</label><input id="pyAmount" type="number" min="1" step="0.01" placeholder="e.g. 500.00"></div>
        <div class="field"><label>Note <span style="font-weight:400;color:var(--muted)">(optional)</span></label><input id="pyNote" placeholder="e.g. Weekly earnings withdrawal"></div>
        <button class="btn primary" id="submitPayout" style="width:100%;margin-top:4px">Submit payout request</button>
        <div class="save-msg" id="payoutMsg"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>My payout requests</h2><span class="muted-note">${payouts.length} total</span></div>
      ${payouts.length?`<div style="overflow:auto;"><table class="table"><thead><tr>
        <th>Date</th><th>Method</th><th>Destination</th><th>Amount</th><th>Status</th>
      </tr></thead><tbody>
        ${payouts.map(p=>{
          const dest=p.method==='mobile_money'
            ?`${esc(p.mobileProvider||'')} ${esc(p.mobileNumber||'')}`
            :`${esc(p.bank||'')} · ${esc(p.accountNumber||'')} (${esc(p.accountName||'')})`;
          const stTag=p.status==='completed'?statusTag('success'):p.status==='processing'?statusTag('pending'):statusTag('pending');
          const stLabel=p.status==='completed'?'completed':p.status==='processing'?'processing':'pending';
          return `<tr>
            <td style="font-family:var(--mono);font-size:11.5px;color:var(--muted)">${new Date(p.createdAt).toLocaleString([],{month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${p.method==='mobile_money'?'Mobile money':'Bank transfer'}</td>
            <td style="font-size:12.5px">${dest}</td>
            <td style="font-family:var(--mono);font-weight:700">${fmt(p.amount,'GHS')}</td>
            <td>${stTag.replace(/(success|pending)/g,stLabel)}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>`:`<div class="empty">No payout requests yet.</div>`}
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Webhook deliveries</h2><span class="muted-note">${events.length} total</span></div>
      ${events.length?`<div style="overflow:auto;"><table class="table"><thead><tr>
        <th>Event</th><th>Charge</th><th>Status</th><th>Response</th><th>Time</th>
      </tr></thead><tbody>
        ${events.map(e=>`<tr>
          <td style="font-family:var(--mono);font-size:12px;">${esc(e.type)}</td>
          <td style="font-family:var(--mono);font-size:12px;">${esc(e.chargeReference)}</td>
          <td>${e.status==='delivered'?statusTag('success'):e.status==='skipped'?`<span class="tag pend"><span class="dot"></span>skipped</span>`:statusTag('failed')}</td>
          <td style="font-family:var(--mono);font-size:12px;">${e.responseCode||'—'}</td>
          <td style="font-family:var(--mono);font-size:11.5px;color:var(--muted);">${new Date(e.createdAt).toLocaleString([], {month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        </tr>`).join('')}
      </tbody></table></div>`:`<div class="empty">No webhook events yet.</div>`}
    </div>

    <div class="panel">
      <div class="panel-head"><h2>API keys &amp; webhook</h2></div>
      <div class="panel-body">
        <div class="field"><label>Public key</label><div class="keyrow">
          <input id="pubKey" readonly value="${esc(merchant.publicKey)}">
          <button class="btn" data-copy="${esc(merchant.publicKey)}">Copy</button>
        </div></div>
        <div class="field"><label>Secret key</label><div class="keyrow">
          <input id="secKey" type="password" readonly value="${esc(merchant.secretKey)}">
          <button class="btn" id="revealSec">Show</button>
          <button class="btn" data-copy="${esc(merchant.secretKey)}">Copy</button>
        </div></div>
        <div class="field"><label>Webhook URL</label><div class="keyrow">
          <input id="webhookUrl" placeholder="https://yourapp.example.com/webhooks/cowrie" value="${merchant.webhookUrl?esc(merchant.webhookUrl):''}">
          <button class="btn primary" id="saveWebhook">Save</button>
        </div>
        <div class="muted-note">Signed with header <code>cowrie-signature</code> using webhook secret <span style="font-family:var(--mono)">${esc(merchant.webhookSecret)}</span>.</div>
        <div class="save-msg" id="webhookMsg"></div></div>
      </div>
    </div>
  `;

  document.getElementById('revealSec').addEventListener('click',()=>{
    const i=document.getElementById('secKey');
    const showing=i.type==='text';
    i.type=showing?'password':'text';
    document.getElementById('revealSec').textContent=showing?'Show':'Hide';
  });
  document.querySelectorAll('[data-copy]').forEach(b=>b.addEventListener('click',()=>{
    navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy).catch(()=>{});
    const t=b.textContent;b.textContent='Copied';setTimeout(()=>b.textContent=t,1100);
  }));
  /* payout method toggle */
  function setPyMethod(m){
    document.getElementById('pyMethod').value=m;
    const isBank=m==='bank';
    document.getElementById('pyBankFields').style.display=isBank?'':'none';
    document.getElementById('pyMomoFields').style.display=isBank?'none':'';
    document.getElementById('pyMethodBank').className='btn'+(isBank?' primary':'');
    document.getElementById('pyMethodMomo').className='btn'+(isBank?'':' primary');
  }
  document.getElementById('pyMethodBank').addEventListener('click',()=>setPyMethod('bank'));
  document.getElementById('pyMethodMomo').addEventListener('click',()=>setPyMethod('mobile_money'));

  document.getElementById('submitPayout').addEventListener('click',async()=>{
    const msg=document.getElementById('payoutMsg');
    msg.className='save-msg';
    const method=document.getElementById('pyMethod').value;
    const amount=parseFloat(document.getElementById('pyAmount').value)||0;
    const body={
      method, amount:Math.round(amount*100),
      bank:document.getElementById('pyBank').value.trim(),
      accountNumber:document.getElementById('pyAccountNumber').value.trim(),
      accountName:document.getElementById('pyAccountName').value.trim(),
      mobileProvider:document.getElementById('pyMobileProvider').value,
      mobileNumber:document.getElementById('pyMobileNumber').value.trim(),
      note:document.getElementById('pyNote').value.trim(),
    };
    const btn=document.getElementById('submitPayout');
    btn.disabled=true;btn.textContent='Submitting…';
    try{
      await API.post('/api/payouts',body);
      msg.textContent='Payout request submitted. The admin will process it shortly.';
      msg.classList.add('ok');
      ['pyBank','pyAccountNumber','pyAccountName','pyMobileNumber','pyAmount','pyNote'].forEach(id=>document.getElementById(id).value='');
      // refresh payout list
      const {payouts:fresh}=await API.get('/api/payouts');
      boot();
    }catch(err){
      msg.textContent=err.message;msg.classList.add('bad');
    }finally{
      btn.disabled=false;btn.textContent='Submit payout request';
    }
  });

  document.getElementById('saveWebhook').addEventListener('click',async ()=>{
    const msg=document.getElementById('webhookMsg');
    msg.className='save-msg';
    try{
      await API.put('/api/me/webhook',{url:document.getElementById('webhookUrl').value.trim()});
      msg.textContent='Saved.';msg.classList.add('ok');
    }catch(err){
      msg.textContent=err.message;msg.classList.add('bad');
    }
  });
}

boot();
</script>
</body>
</html>
