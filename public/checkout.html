<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
/* ─── Tokens (dark) ─── */
:root{
  --ivory:#0F0C22; --ivory-2:#141028; --white:#0D0A1E;
  --ink:#EAE5F5; --ink-soft:rgba(234,229,245,.65); --muted:rgba(234,229,245,.4); --faint:rgba(234,229,245,.22);
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.06);
  --plum:#6B38A8; --plum-deep:#3A1A60; --plum-br:#9B6AE0; --plum-tint:rgba(91,44,143,.28);
  --gold:#E0A12E; --gold-deep:#C8901A; --gold-tint:rgba(224,161,46,.22);
  --mint:#1FA877; --mint-tint:rgba(31,168,119,.2); --coral:#EF6A4C; --coral-tint:rgba(239,106,76,.18);
  --display:'Plus Jakarta Sans',sans-serif; --body:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
}

/* ─── Reset ─── */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#09071A;color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.5;
  min-height:100vh;display:grid;place-items:center;padding:24px 16px;
  position:relative;overflow-x:hidden;
}
::selection{background:var(--plum);color:#fff}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}

/* ─── Background scene ─── */
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-grid{
  position:absolute;left:-40%;right:-40%;bottom:-5%;height:75%;
  background-image:linear-gradient(rgba(91,44,143,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(91,44,143,.22) 1px,transparent 1px);
  background-size:70px 70px;
  transform:perspective(550px) rotateX(58deg);transform-origin:center bottom;
  animation:gridScroll 10s linear infinite;
  mask-image:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 55%,transparent 100%);
  -webkit-mask-image:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 55%,transparent 100%);
}
@keyframes gridScroll{from{background-position:0 0}to{background-position:0 70px}}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px}
.orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none}
.orb-1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(91,44,143,.4),transparent 65%);animation:drift1 28s ease-in-out infinite}
.orb-2{width:500px;height:500px;bottom:-200px;right:-100px;background:radial-gradient(circle,rgba(200,134,10,.2),transparent 65%);animation:drift2 33s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-50px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,28px)}}

/* ─── Brand shell ─── */
.shell{width:22px;height:22px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum-br));position:relative;box-shadow:inset 0 -2px 4px rgba(0,0,0,.3),0 0 12px rgba(224,161,46,.2);flex-shrink:0}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.7);transform:translateX(-50%);border-radius:2px}

/* ─── Checkout card ─── */
.checkout{
  position:relative;z-index:1;width:min(94vw,440px);
  background:rgba(14,11,34,.82);
  border:1px solid rgba(255,255,255,.1);
  border-radius:22px;
  box-shadow:0 40px 90px rgba(0,0,0,.7),0 0 0 1px rgba(91,44,143,.08) inset,0 2px 0 rgba(255,255,255,.05) inset;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  overflow:hidden;
}

/* ─── Header ─── */
.co-head{padding:20px 22px 18px;border-bottom:1px solid var(--line-2);position:relative}
.co-merch{display:flex;align-items:center;gap:11px}
.co-merch .av{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--plum),var(--plum-br));display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--display);font-size:17px;box-shadow:0 4px 14px rgba(91,44,143,.35)}
.co-merch .nm{font-weight:700;font-size:15px;color:var(--ink)}
.co-merch .url{font-family:var(--mono);font-size:11px;color:var(--muted)}
.co-timer{position:absolute;top:20px;right:22px;font-family:var(--mono);font-size:11px;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--line);padding:4px 9px;border-radius:7px;backdrop-filter:blur(8px)}
.co-amt{margin-top:16px;display:flex;align-items:baseline;gap:8px}
.co-amt .l{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.co-amt .v{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.02em;margin-left:auto;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;background-clip:text;color:transparent}
.co-email{margin-top:12px;width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-family:var(--body);font-size:13.5px;color:var(--ink);outline:none;transition:.18s;-webkit-backdrop-filter:blur(8px)}
.co-email:focus{border-color:rgba(107,56,168,.6);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(91,44,143,.18)}
.co-email::placeholder{color:var(--faint)}

/* ─── Test badge ─── */
.testbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--gold);background:rgba(224,161,46,.14);border:1px solid rgba(224,161,46,.28);padding:3px 8px;border-radius:6px;margin-top:14px}

/* ─── Method tabs ─── */
.co-body{padding:18px 22px 22px}
.methods{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:18px}
.mtab{display:flex;flex-direction:column;align-items:center;gap:6px;padding:11px 4px;border:1.5px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);transition:.18s;font-size:11px;font-weight:600;color:var(--muted)}
.mtab:hover{border-color:rgba(107,56,168,.4);background:rgba(255,255,255,.07);color:var(--ink-soft)}
.mtab.on{border-color:rgba(107,56,168,.55);background:rgba(91,44,143,.2);color:#C9AEFF;box-shadow:0 0 16px rgba(91,44,143,.2)}
.mtab .mi{width:24px;height:24px}.mtab .mi svg{width:22px;height:22px}

/* ─── Form fields ─── */
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--ink-soft)}
.inp-wrap{position:relative}
.field input,.field select{
  width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--line);
  border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:14.5px;
  color:var(--ink);outline:none;transition:.18s;
}
.field input.mono{font-family:var(--mono);letter-spacing:.04em}
.field input::placeholder{color:var(--faint)}
.field select option{background:#1A1535;color:var(--ink)}
.field input:focus,.field select:focus{border-color:rgba(107,56,168,.6);box-shadow:0 0 0 4px rgba(91,44,143,.18);background:rgba(255,255,255,.08)}
.field input.bad{border-color:rgba(239,106,76,.6);box-shadow:0 0 0 4px rgba(239,106,76,.12)}
.err{color:var(--coral);font-size:11.5px;margin-top:5px;display:none}.err.show{display:block}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.seg button{border:1.5px solid var(--line);background:rgba(255,255,255,.04);border-radius:10px;padding:10px 4px;font-size:12px;font-weight:600;color:var(--muted);transition:.18s}
.seg button:hover{border-color:rgba(107,56,168,.35);color:var(--ink-soft)}
.seg button.on{border-color:rgba(107,56,168,.55);background:rgba(91,44,143,.2);color:#C9AEFF}
.hint{font-size:11.5px;color:var(--muted);margin:2px 0 12px;display:flex;align-items:center;gap:6px}
.hint b{color:var(--ink-soft);font-family:var(--mono)}

/* ─── Pay button ─── */
.pay{width:100%;background:linear-gradient(135deg,var(--plum),var(--plum-br));color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15.5px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.22s;position:relative;margin-top:4px;box-shadow:0 6px 24px rgba(91,44,143,.35)}
.pay:hover{background:linear-gradient(135deg,var(--plum-deep),var(--plum));box-shadow:0 8px 32px rgba(91,44,143,.5)}
.pay:disabled{opacity:.45;pointer-events:none}
.pay.loading{color:transparent;pointer-events:none}
.pay .spin{position:absolute;width:19px;height:19px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:none;animation:spin .7s linear infinite}
.pay.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Transfer / USSD ─── */
.detail-box{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin-bottom:14px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.drow:last-child{border-bottom:none}
.drow .k{font-family:var(--mono);font-size:11px;color:var(--muted)}
.drow .v{font-family:var(--mono);font-weight:700;display:flex;align-items:center;gap:8px;color:var(--ink)}
.copy{background:rgba(255,255,255,.07);border:1px solid var(--line);color:#C9AEFF;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;transition:.15s}
.copy:hover{background:rgba(91,44,143,.2);border-color:rgba(91,44,143,.5)}
.ussd-code{text-align:center;font-family:var(--mono);font-weight:700;font-size:24px;letter-spacing:.04em;background:rgba(91,44,143,.15);border:1px dashed rgba(107,56,168,.5);border-radius:12px;padding:18px;margin-bottom:14px;color:#C9AEFF}

/* ─── Back button ─── */
.back{display:inline-flex;align-items:center;gap:7px;background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:12px;margin-bottom:14px;transition:.15s}
.back:hover{color:#C9AEFF}

/* ─── State screens ─── */
.state{text-align:center;padding:18px 6px}
.state .ic{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px;border:1px solid rgba(255,255,255,.1)}
.ic svg{filter:brightness(2.5) saturate(.95)}
.state h3{font-family:var(--display);font-weight:700;font-size:19px;color:var(--ink)}
.state p{color:var(--ink-soft);font-size:14px;margin-top:8px;max-width:300px;margin-inline:auto}
.spinbig{width:50px;height:50px;border:4px solid rgba(255,255,255,.08);border-top-color:var(--plum-br);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
.otp-boxes{display:flex;gap:9px;justify-content:center;margin:20px 0 14px}
.otp-boxes input{width:42px;height:52px;text-align:center;font-family:var(--mono);font-weight:700;font-size:22px;border:1.5px solid var(--line);border-radius:11px;outline:none;color:var(--ink);background:rgba(255,255,255,.06)}
.otp-boxes input:focus{border-color:rgba(107,56,168,.6);box-shadow:0 0 0 4px rgba(91,44,143,.18);background:rgba(255,255,255,.09)}
.resend{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:6px}
.resend b{color:var(--ink-soft)}
.done-ic{background:var(--mint)!important;color:#fff!important;box-shadow:0 0 40px -8px rgba(31,168,119,.6);border-color:rgba(31,168,119,.4)!important}
.done-ic svg{filter:none!important}
.phone-pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(107,56,168,.5)}50%{box-shadow:0 0 0 10px transparent}}
.receipt{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin:16px 0;text-align:left}

/* ─── Test creds ─── */
.test-creds{background:rgba(224,161,46,.1);border:1px dashed rgba(224,161,46,.35);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:12px}
.test-creds strong{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);display:block;margin-bottom:6px}
.test-creds .tcrow{display:flex;justify-content:space-between;align-items:center;margin:3px 0}
.test-creds .tcrow span{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft)}
.test-creds .tcrow small{color:var(--muted);font-size:10.5px}

/* ─── Footer ─── */
.co-foot{padding:14px 22px;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.co-foot .lock{display:flex;align-items:center;gap:5px}
.co-foot .pwr{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--ink-soft);font-weight:600}

@media(max-width:480px){.co-name{font-size:16px!important}.co-amt{font-size:30px!important}.field input,.field select{font-size:16px!important}.otp-boxes input{font-size:18px!important;width:38px;height:48px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

<!-- 3D background -->
<div class="bg-scene">
  <div class="bg-dots"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="checkout">
  <div class="co-head">
    <div class="co-merch">
      <div class="av" id="avLetter">?</div>
      <div><div class="nm" id="merchName">Loading…</div><div class="url">checkout.cowrie.africa</div></div>
      <button id="closeBtn" title="Cancel" style="margin-left:auto;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--muted);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;transition:.15s;flex-shrink:0" onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--muted)'">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="co-timer" id="timer">14:59</div>
    <div class="co-amt"><span class="l" id="amtLbl">Pay</span><span class="v" id="amtV">₵ 250.00</span></div>
    <input class="co-email" id="email" type="email" placeholder="Email address">
    <span class="testbadge"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg> TEST MODE</span>
  </div>
  <div class="co-body" id="body"></div>
  <div class="co-foot">
    <span class="lock"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg> PCI-DSS secured</span>
    <span class="pwr"><span class="shell"></span>Cowrie</span>
  </div>
</div>

<script>
"use strict";
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=s=>document.querySelector(s);
const SYMS={GHS:'₵',NGN:'₦',KES:'KSh',ZAR:'R',USD:'$',EUR:'€',GBP:'£'};
const fmt=(minor,ccy)=>(SYMS[ccy]||(ccy+' '))+' '+(minor/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const S={method:'card',step:'form',provider:'MTN',charge:null,bankDetail:null};
const amount=()=>S.charge?S.charge.amount:0;
const ccy=()=>S.charge?S.charge.currency:'GHS';
const merchantName=()=>(S.charge&&S.charge.merchantName)||'Cowrie';

const API={
  async get(path){const r=await fetch(path);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;},
  async post(path,body,hdrs){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json',...(hdrs||{})},body:JSON.stringify(body||{})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;}
};

(function(){let t=899;const e=$('#timer');setInterval(()=>{if(reduce)return;t=Math.max(0,t-1);const m=Math.floor(t/60),s=t%60;e.textContent=m+':'+s.toString().padStart(2,'0');e.style.color=t<120?'var(--coral)':'';},1000);})();

const ICONS={
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
  bank:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6"/></svg>',
  momo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>',
  ussd:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h14M5 21h14M7 3v18M17 3v18M9 8h6M9 12h6"/></svg>'
};
const METHODS=[['card','Card'],['momo','Mobile money']];
let TEST_MODE=true;

function tabs(){
  return `<div class="methods">${METHODS.map(([id,lbl])=>`<button class="mtab ${S.method===id?'on':''}" data-m="${id}"><span class="mi">${ICONS[id]}</span>${lbl}</button>`).join('')}</div>`;
}
function payBtn(label){return `<button class="pay" id="pay"><span class="spin"></span><span class="lbl">${label}</span></button>`;}

function formFor(m){
  const payLabel='Pay '+fmt(amount(),ccy());
  const info='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>';
  if(m==='card') return `
    ${TEST_MODE?`<div class="test-creds">
      <strong>⚡ TEST CARD — enter in Paystack popup</strong>
      <div class="tcrow"><span>4084 0840 8408 4081</span><small>Verve</small></div>
      <div class="tcrow"><span>CVV: 408</span><small>Expiry: 01 / 99</small></div>
      <div class="tcrow"><span>PIN: 0000</span><small>OTP: 123456</small></div>
    </div>`:''}
    <div class="hint">${info}Tap Pay — a secure Paystack form will open to process your card. We never see your card details.</div>
    ${payBtn(payLabel)}`;
  if(m==='momo') return `
    ${TEST_MODE?`<div class="test-creds">
      <strong>⚡ TEST — MOBILE MONEY</strong>
      <div class="tcrow"><span>Use any valid 10-digit Ghana number</span></div>
      <div class="tcrow"><span>e.g. 0241234567 (MTN)</span></div>
      <div class="tcrow"><span>Approve the prompt that appears on screen</span></div>
    </div>`:''}

    <div class="field"><label>Network</label></div>
    <div class="seg" id="prov">${['MTN','Vodafone','AirtelTigo'].map(p=>`<button data-p="${p}" class="${S.provider===p?'on':''}">${p}</button>`).join('')}</div>
    <div class="field"><label>Mobile money number</label>
      <input class="mono" id="phone" inputmode="numeric" placeholder="024 123 4567" maxlength="13" autocomplete="tel">
      <div class="err" id="phoneErr">Enter a valid 10-digit number</div></div>
    <div class="hint">${info}You will receive a prompt on your phone to approve this payment.</div>
    ${payBtn(payLabel)}`;
}

async function payWithInline(){
  const btn=$('#pay');
  btn.classList.add('loading');
  const email=($('#email')&&$('#email').value.trim())||'';
  try{
    const {accessCode,publicKey}=await API.post(`/api/charges/${S.charge.reference}/paystack-init`,{email,channels:['card']});
    btn.classList.remove('loading');
    const handler=PaystackPop.setup({
      key:publicKey,
      access_code:accessCode,
      callback:function(){
        const b=$('#body');
        if(b)b.innerHTML=`<div class="state"><div class="spinbig"></div><p style="color:var(--muted);margin-top:8px;font-size:13.5px">Confirming payment…</p></div>`;
        API.get(`/api/charges/${S.charge.reference}/verify`)
          .then(function(d){S.charge=d.charge;go(d.charge.status==='success'?'success':'failed');})
          .catch(function(){go('failed');});
      },
      onClose:function(){btn.classList.remove('loading');}
    });
    handler.openIframe();
  }catch(err){
    btn.classList.remove('loading');
    alert(err.message);
  }
}

function bindForm(){
  const m=S.method;
  if(m==='card'){
    $('#pay').addEventListener('click',payWithInline);
  }else if(m==='momo'){
    $('#prov').querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{S.provider=btn.dataset.p;$('#prov').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));}));
    const phone=$('#phone');
    phone.addEventListener('input',()=>{phone.value=phone.value.replace(/[^\d ]/g,'');phone.classList.remove('bad');$('#phoneErr').classList.remove('show');});
    $('#pay').addEventListener('click',()=>{
      const d=phone.value.replace(/\D/g,'');
      if(d.length<10){phone.classList.add('bad');$('#phoneErr').classList.add('show');return;}
      submitPay($('#pay'),'mobile_money',{phone:d,provider:S.provider});
    });
  }
}

async function submitPay(btn,method,details){
  btn.classList.add('loading');
  const email=($('#email')&&$('#email').value.trim())||'';
  try{
    const {charge,next,detail}=await API.post(`/api/charges/${S.charge.reference}/pay`,{method,email,...details});
    S.charge=charge;
    btn.classList.remove('loading');
    handleNext(next,detail);
  }catch(err){
    btn.classList.remove('loading');
    alert(err.message);
  }
}

function handleNext(next,detail){
  if(next==='success')go('success');
  else if(next==='failed')go('failed');
  else if(next==='otp')go('otp');
  else if(next==='pin')go('pin');
  else if(next==='bank_details'){S.bankDetail=detail;go('bank');}
  else{go('approve');startPolling();}
}

let _poll=null;
function startPolling(){
  if(_poll)clearInterval(_poll);
  _poll=setInterval(async()=>{
    try{
      const {charge,next}=await API.get(`/api/charges/${S.charge.reference}/poll`);
      S.charge=charge;
      if(next==='success'||next==='failed'){clearInterval(_poll);_poll=null;go(next);}
    }catch(e){}
  },3500);
  setTimeout(()=>{if(_poll){clearInterval(_poll);_poll=null;}},600000);
}

function render(){
  const b=$('#body');
  if(!S.charge){b.innerHTML='<div class="state"><div class="spinbig"></div><h3>Loading checkout…</h3></div>';return;}
  if(S.step==='form'){
    $('#amtLbl').textContent='Pay '+merchantName();
    $('#amtV').textContent=fmt(amount(),ccy());
    b.innerHTML=tabs()+formFor(S.method);
    b.querySelectorAll('.mtab').forEach(t=>t.addEventListener('click',()=>{S.method=t.dataset.m;render();}));
    bindForm();
  }
  else if(S.step==='otp')renderOtp(b);
  else if(S.step==='pin')renderPin(b);
  else if(S.step==='approve')b.innerHTML=stateApprove();
  else if(S.step==='bank')renderBankDetails(b);
  else if(S.step==='success')b.innerHTML=stateSuccess();
  else if(S.step==='failed')b.innerHTML=stateFailed();
}
function go(step){S.step=step;render();}

function renderOtp(b){
  b.innerHTML=`<button class="back" id="back">← Back</button>
    <div class="state">
      <div class="ic" style="background:var(--plum-tint);color:var(--plum)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
      <h3>Verify it's you</h3><p>Enter the 6-digit OTP sent to the phone number linked to your card.</p>
      <div class="otp-boxes" id="otp">${Array.from({length:6}).map((_,i)=>`<input inputmode="numeric" maxlength="1" data-i="${i}">`).join('')}</div>
      <button class="pay" id="verify" disabled><span class="spin"></span><span class="lbl">Confirm — ${fmt(amount(),ccy())}</span></button>
    </div>`;
  $('#back').addEventListener('click',()=>go('form'));
  const boxes=[...$('#otp').querySelectorAll('input')];
  const check=()=>$('#verify').disabled=boxes.map(x=>x.value).join('').length<6;
  boxes.forEach((bx,i)=>{
    bx.addEventListener('input',()=>{bx.value=bx.value.replace(/\D/g,'');if(bx.value&&i<5)boxes[i+1].focus();check();});
    bx.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!bx.value&&i>0)boxes[i-1].focus();});
  });
  boxes[0].focus();
  $('#verify').addEventListener('click',async()=>{
    const v=$('#verify'),otp=boxes.map(x=>x.value).join('');
    v.classList.add('loading');
    try{const {charge,next,detail}=await API.post(`/api/charges/${S.charge.reference}/submit-otp`,{otp});S.charge=charge;v.classList.remove('loading');handleNext(next,detail);}
    catch(err){v.classList.remove('loading');alert(err.message);}
  });
}

function renderPin(b){
  b.innerHTML=`<button class="back" id="back">← Back</button>
    <div class="state">
      <div class="ic" style="background:var(--plum-tint);color:var(--plum)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
      <h3>Enter your card PIN</h3><p>Enter your 4-digit card PIN to authorise this payment.</p>
      <div class="otp-boxes" id="pin">${Array.from({length:4}).map((_,i)=>`<input inputmode="numeric" maxlength="1" type="password" data-i="${i}">`).join('')}</div>
      <button class="pay" id="submitPin" disabled><span class="spin"></span><span class="lbl">Continue</span></button>
    </div>`;
  $('#back').addEventListener('click',()=>go('form'));
  const boxes=[...$('#pin').querySelectorAll('input')];
  const check=()=>$('#submitPin').disabled=boxes.map(x=>x.value).join('').length<4;
  boxes.forEach((bx,i)=>{
    bx.addEventListener('input',()=>{bx.value=bx.value.replace(/\D/g,'');if(bx.value&&i<3)boxes[i+1].focus();check();});
    bx.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!bx.value&&i>0)boxes[i-1].focus();});
  });
  boxes[0].focus();
  $('#submitPin').addEventListener('click',async()=>{
    const v=$('#submitPin'),pin=boxes.map(x=>x.value).join('');
    v.classList.add('loading');
    try{const {charge,next,detail}=await API.post(`/api/charges/${S.charge.reference}/submit-pin`,{pin});S.charge=charge;v.classList.remove('loading');handleNext(next,detail);}
    catch(err){v.classList.remove('loading');alert(err.message);}
  });
}

function renderBankDetails(b){
  const a=S.bankDetail||{};
  b.innerHTML=`<div class="detail-box">
    <div class="drow"><span class="k">BANK</span><span class="v">${a.bank_name||'—'}</span></div>
    <div class="drow"><span class="k">ACCOUNT</span><span class="v">${a.account_number||'—'} <button class="copy" data-c="${a.account_number||''}">copy</button></span></div>
    <div class="drow"><span class="k">AMOUNT</span><span class="v">${fmt(amount(),ccy())}</span></div>
  </div>
  <div class="hint" style="justify-content:center"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Transfer the exact amount above. Waiting for confirmation…</div>`;
  b.querySelectorAll('.copy').forEach(c=>c.addEventListener('click',()=>{navigator.clipboard&&navigator.clipboard.writeText(c.dataset.c).catch(()=>{});c.textContent='copied!';setTimeout(()=>c.textContent='copy',1200);}));
  startPolling();
}

function stateApprove(){
  const p=S.provider||'';
  return `<div class="state">
    <div class="ic phone-pulse" style="background:var(--plum-tint);color:var(--plum)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg></div>
    <h3>Approve on your phone</h3>
    <p>A prompt has been sent to your ${p?p+' ':''}line. Enter your mobile money PIN to authorise ${fmt(amount(),ccy())}.</p>
    <div class="hint" style="justify-content:center;margin-top:14px"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Waiting for confirmation…</div>
  </div>`;
}

function stateSuccess(){
  if(_poll){clearInterval(_poll);_poll=null;}
  $('#amtLbl').textContent='Paid to '+merchantName();
  const ch=S.charge.auth&&S.charge.auth.channel;
  const ML={card:'Card',mobile_money:'Mobile money',bank_transfer:'Bank transfer',ussd:'USSD'};
  const methodLabel=ML[ch||S.charge.method]||S.charge.method||'—';
  return `<div class="state">
    <div class="ic done-ic"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h3>Payment successful</h3><p>Your payment of ${fmt(amount(),ccy())} to ${merchantName()} is complete.</p>
    <div class="receipt">
      <div class="drow"><span class="k">REFERENCE</span><span class="v">${S.charge.reference}</span></div>
      <div class="drow"><span class="k">METHOD</span><span class="v">${methodLabel}</span></div>
      <div class="drow"><span class="k">AMOUNT</span><span class="v" style="color:var(--mint)">${fmt(amount(),ccy())}</span></div>
    </div>
    <button class="pay" id="ret">Return to ${merchantName()}</button>
  </div>`;
}

function stateFailed(){
  if(_poll){clearInterval(_poll);_poll=null;}
  const f=S.charge.failure||{message:'Your payment could not be processed.'};
  return `<div class="state">
    <div class="ic" style="background:var(--coral-tint);color:var(--coral)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg></div>
    <h3>Payment failed</h3><p>${f.message}</p>
    <button class="pay" id="retry" style="margin-top:10px">Try again</button>
  </div>`;
}

function routeFromCharge(){
  updateMerchantDisplay();
  const st=S.charge.status;
  if(st==='success')go('success');
  else if(st==='failed')go('failed');
  else go('form');
}

async function boot(){
  const infoP=API.get('/api/info').then(d=>{TEST_MODE=d.testMode!==false;}).catch(()=>{});
  const params=new URLSearchParams(location.search);
  const ref=params.get('reference');
  try{
    if(ref){
      try{
        const {charge}=await API.get('/api/charges/'+encodeURIComponent(ref));
        S.charge=charge;
      }catch(e){
        const isDemoReload=document.referrer.includes(location.host)||!document.referrer;
        if(isDemoReload){
          history.replaceState(null,'',location.pathname);
          const {publicKey}=await API.get('/api/demo/public-key');
          const email=($('#email')&&$('#email').value)||'demo@cowrie.africa';
          const {charge}=await API.post('/api/charges',{amount:25000,currency:'GHS',email},{'x-public-key':publicKey});
          S.charge=charge;
          history.replaceState(null,'','?reference='+charge.reference);
        }else{
          $('#body').innerHTML=`<div class="state">
            <div class="ic" style="background:var(--gold-tint);color:var(--gold-deep)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg></div>
            <h3>Payment link expired</h3>
            <p>This payment link is no longer valid. Please contact the merchant for a new link.</p>
          </div>`;
          return;
        }
      }
    }else{
      const {publicKey}=await API.get('/api/demo/public-key');
      const email=($('#email')&&$('#email').value)||'demo@cowrie.africa';
      const {charge}=await API.post('/api/charges',{amount:25000,currency:'GHS',email},{'x-public-key':publicKey});
      S.charge=charge;
      history.replaceState(null,'','?reference='+charge.reference);
    }
  }catch(err){
    $('#body').innerHTML=`<div class="state"><h3>Couldn't start checkout</h3><p>${err.message}</p></div>`;
    return;
  }
  await infoP;
  if(!TEST_MODE){const tb=document.querySelector('.testbadge');if(tb)tb.style.display='none';}
  routeFromCharge();
}

function updateMerchantDisplay(){
  const name=merchantName();
  const nm=document.getElementById('merchName');
  const av=document.getElementById('avLetter');
  if(nm)nm.textContent=name;
  if(av)av.textContent=name.charAt(0).toUpperCase();
  document.title='Cowrie Checkout — '+name;
}

document.getElementById('closeBtn').addEventListener('click',()=>{
  const url=(S.charge&&S.charge.callbackUrl)||document.referrer||'/';
  location.href=url;
});

document.addEventListener('click',e=>{
  if(e.target&&e.target.id==='ret')location.href='/';
  if(e.target&&e.target.id==='retry')location.reload();
});
boot();
</script>
</body>
</html>
