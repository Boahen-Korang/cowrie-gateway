<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie Checkout — Adɔm Stores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#F7F5F0; --ivory-2:#FBFAF6; --white:#FFFFFF;
  --ink:#1B1330; --ink-soft:#564E68; --muted:#7A7388; --faint:#A39CB0;
  --line:#E8E3DA; --line-2:#EFEBE3;
  --plum:#5B2C8F; --plum-deep:#3A1A60; --plum-br:#7B45B8; --plum-tint:#EFE6F7;
  --gold:#E0A12E; --gold-deep:#B8801C; --gold-tint:#F8EFD9;
  --mint:#1FA877; --mint-tint:#DCF1E9; --coral:#EF6A4C; --coral-tint:#FBE7E1;
  --display:'Plus Jakarta Sans',sans-serif; --body:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ivory);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;display:grid;place-items:center;padding:24px 16px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(60vw 50vw at 80% -10%,var(--plum-tint),transparent 60%),radial-gradient(50vw 40vw at 10% 110%,var(--gold-tint),transparent 60%);opacity:.7}
::selection{background:var(--plum);color:#fff}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}
.shell{width:22px;height:22px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum-br));position:relative;box-shadow:inset 0 -2px 4px rgba(0,0,0,.2);flex-shrink:0}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.6);transform:translateX(-50%);border-radius:2px}

.checkout{position:relative;z-index:1;width:min(94vw,440px);background:var(--white);border:1px solid var(--line);border-radius:22px;box-shadow:0 40px 90px -40px rgba(27,19,48,.4);overflow:hidden}

/* header */
.co-head{padding:20px 22px 18px;border-bottom:1px solid var(--line-2);position:relative}
.co-merch{display:flex;align-items:center;gap:11px}
.co-merch .av{width:40px;height:40px;border-radius:11px;background:var(--plum);display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--display);font-size:17px}
.co-merch .nm{font-weight:700;font-size:15px}.co-merch .url{font-family:var(--mono);font-size:11px;color:var(--muted)}
.co-timer{position:absolute;top:20px;right:22px;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--ivory-2);border:1px solid var(--line);padding:4px 9px;border-radius:7px}
.co-amt{margin-top:16px;display:flex;align-items:baseline;gap:8px}
.co-amt .l{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.co-amt .v{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.02em;margin-left:auto}
.co-email{margin-top:12px;width:100%;background:var(--ivory-2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-family:var(--body);font-size:13.5px;color:var(--ink);outline:none}
.co-email:focus{border-color:var(--plum);background:var(--white)}

/* test badge */
.testbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--gold-deep);background:var(--gold-tint);padding:3px 8px;border-radius:6px;margin-top:14px}

/* method tabs */
.co-body{padding:18px 22px 22px}
.methods{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:18px}
.mtab{display:flex;flex-direction:column;align-items:center;gap:6px;padding:11px 4px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);transition:.18s;font-size:11px;font-weight:600;color:var(--ink-soft)}
.mtab:hover{border-color:var(--plum-tint)}
.mtab.on{border-color:var(--plum);background:var(--plum-tint);color:var(--plum)}
.mtab .mi{width:24px;height:24px}.mtab .mi svg{width:22px;height:22px}

/* form fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}
.inp-wrap{position:relative}
.field input,.field select{width:100%;background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:14.5px;color:var(--ink);outline:none;transition:.18s}
.field input.mono{font-family:var(--mono);letter-spacing:.04em}
.field input:focus,.field select:focus{border-color:var(--plum);box-shadow:0 0 0 4px var(--plum-tint)}
.field input.bad{border-color:var(--coral);box-shadow:0 0 0 4px var(--coral-tint)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.brand-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;font-weight:700;color:var(--plum);background:var(--plum-tint);padding:3px 7px;border-radius:5px}
.err{color:var(--coral);font-size:11.5px;margin-top:5px;display:none}.err.show{display:block}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.seg button{border:1.5px solid var(--line);background:var(--white);border-radius:10px;padding:10px 4px;font-size:12px;font-weight:600;color:var(--ink-soft);transition:.18s}
.seg button.on{border-color:var(--plum);background:var(--plum-tint);color:var(--plum)}
.hint{font-size:11.5px;color:var(--muted);margin:2px 0 12px;display:flex;align-items:center;gap:6px}
.hint b{color:var(--ink);font-family:var(--mono)}

/* pay button */
.pay{width:100%;background:var(--plum);color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15.5px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.22s;position:relative;margin-top:4px}
.pay:hover{background:var(--plum-deep)}
.pay:disabled{opacity:.5;pointer-events:none}
.pay.loading{color:transparent;pointer-events:none}
.pay .spin{position:absolute;width:19px;height:19px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:none;animation:spin .7s linear infinite}
.pay.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* transfer / ussd detail */
.detail-box{background:var(--ivory-2);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin-bottom:14px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.drow:last-child{border-bottom:none}
.drow .k{font-family:var(--mono);font-size:11px;color:var(--muted)}
.drow .v{font-family:var(--mono);font-weight:700;display:flex;align-items:center;gap:8px}
.copy{background:var(--white);border:1px solid var(--line);color:var(--plum);font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px}
.copy:hover{background:var(--plum-tint)}
.ussd-code{text-align:center;font-family:var(--mono);font-weight:700;font-size:24px;letter-spacing:.04em;background:var(--ivory-2);border:1px dashed var(--plum-br);border-radius:12px;padding:18px;margin-bottom:14px;color:var(--plum)}

/* back link */
.back{display:inline-flex;align-items:center;gap:7px;background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:12px;margin-bottom:14px}
.back:hover{color:var(--plum)}

/* OTP / approve states */
.state{text-align:center;padding:18px 6px}
.state .ic{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px}
.state h3{font-family:var(--display);font-weight:700;font-size:19px}
.state p{color:var(--ink-soft);font-size:14px;margin-top:8px;max-width:300px;margin-inline:auto}
.spinbig{width:50px;height:50px;border:4px solid var(--line);border-top-color:var(--plum);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
.otp-boxes{display:flex;gap:9px;justify-content:center;margin:20px 0 14px}
.otp-boxes input{width:42px;height:52px;text-align:center;font-family:var(--mono);font-weight:700;font-size:22px;border:1.5px solid var(--line);border-radius:11px;outline:none;color:var(--ink)}
.otp-boxes input:focus{border-color:var(--plum);box-shadow:0 0 0 4px var(--plum-tint)}
.resend{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:6px}
.resend b{color:var(--ink)}
.done-ic{background:var(--mint);color:#fff;box-shadow:0 0 40px -8px rgba(31,168,119,.5)}
.phone-pulse{background:var(--plum-tint);color:var(--plum);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--plum-tint)}50%{box-shadow:0 0 0 10px transparent}}
.receipt{background:var(--ivory-2);border:1px solid var(--line);border-radius:12px;padding:4px 16px;margin:16px 0;text-align:left}

/* footer */
.co-foot{padding:14px 22px;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.co-foot .lock{display:flex;align-items:center;gap:5px}
.co-foot .pwr{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--ink-soft);font-weight:600}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="checkout">
  <div class="co-head">
    <div class="co-merch"><div class="av">A</div><div><div class="nm">Adɔm Stores</div><div class="url">checkout.cowrie.africa</div></div></div>
    <div class="co-timer" id="timer">14:59</div>
    <div class="co-amt"><span class="l" id="amtLbl">Pay Adɔm Stores</span><span class="v" id="amtV">₵ 250.00</span></div>
    <input class="co-email" id="email" type="email" value="ama@adom.shop" placeholder="Email address">
    <span class="testbadge"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg> TEST MODE</span>
  </div>
  <div class="co-body" id="body"></div>
    <div class="co-foot">
    <span class="lock"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg> PCI-DSS secured</span>
    <span class="pwr"><span class="shell"></span>Cowrie</span>
  </div>
  <div style="position:fixed;left:14px;bottom:14px;z-index:20;">
    <a href="index.html" style="background:var(--white);border:1px solid var(--line);color:var(--plum);font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 12px;border-radius:10px;display:inline-flex;align-items:center;gap:7px;text-decoration:none;">← Back to site</a>
  </div>
</div>

<script>
"use strict";
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=s=>document.querySelector(s);
const SYMS={GHS:'₵',NGN:'₦',KES:'KSh',ZAR:'R',USD:'$',EUR:'€',GBP:'£'};
const fmt=(minor,ccy)=>(SYMS[ccy]||(ccy+' '))+' '+(minor/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const S={method:'card',step:'form',provider:'MTN',charge:null,bankDetail:null};
const amount=()=>S.charge?S.charge.amount:0;
const ccy=()=>S.charge?S.charge.currency:'GHS';
const merchantName=()=>(S.charge&&S.charge.merchantName)||'Cowrie';

const API={
  async get(path){const r=await fetch(path);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;},
  async post(path,body,hdrs){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json',...(hdrs||{})},body:JSON.stringify(body||{})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||'Request failed.');return d;}
};

(function(){let t=899;const e=$('#timer');setInterval(()=>{if(reduce)return;t=Math.max(0,t-1);const m=Math.floor(t/60),s=t%60;e.textContent=m+':'+s.toString().padStart(2,'0');e.style.color=t<120?'var(--coral)':'';},1000);})();

const ICONS={
  card:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
  bank:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6"/></svg>',
  momo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>',
  ussd:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h14M5 21h14M7 3v18M17 3v18M9 8h6M9 12h6"/></svg>'
};
const METHODS=[['card','Card'],['momo','Mobile money'],['bank','Bank'],['ussd','USSD']];

function tabs(){
  return `<div class="methods">${METHODS.map(([id,lbl])=>`<button class="mtab ${S.method===id?'on':''}" data-m="${id}"><span class="mi">${ICONS[id]}</span>${lbl}</button>`).join('')}</div>`;
}
function payBtn(label){return `<button class="pay" id="pay"><span class="spin"></span><span class="lbl">${label}</span></button>`;}

function detectBrand(n){if(/^4/.test(n))return'VISA';if(/^(5[1-5]|2[2-7])/.test(n))return'MASTERCARD';if(/^(506[01]|6280|650|5078)/.test(n))return'VERVE';return'';}
function luhn(n){let s=0,a=false;for(let i=n.length-1;i>=0;i--){let d=+n[i];if(a){d*=2;if(d>9)d-=9;}s+=d;a=!a;}return s%10===0;}

function formFor(m){
  const payLabel='Pay '+fmt(amount(),ccy());
  const info='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>';
  if(m==='card') return `
    <div class="field"><label>Card number</label>
      <div class="inp-wrap"><input class="mono" id="ccn" inputmode="numeric" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="cc-number">
      <span class="brand-badge" id="brand" style="display:none"></span></div>
      <div class="err" id="ccnErr">Enter a valid 16-digit card number</div></div>
    <div class="row2">
      <div class="field"><label>Expiry</label><input class="mono" id="exp" inputmode="numeric" placeholder="MM / YY" maxlength="7" autocomplete="cc-exp"><div class="err" id="expErr">Invalid expiry</div></div>
      <div class="field"><label>CVV</label><input class="mono" id="cvv" inputmode="numeric" placeholder="123" maxlength="4" autocomplete="cc-csc"><div class="err" id="cvvErr">Invalid CVV</div></div>
    </div>
    <div class="hint">${info}Your card details are transmitted securely and never stored.</div>
    ${payBtn(payLabel)}`;
  if(m==='momo') return `
    <div class="field"><label>Network</label></div>
    <div class="seg" id="prov">${['MTN','Vodafone','AirtelTigo'].map(p=>`<button data-p="${p}" class="${S.provider===p?'on':''}">${p}</button>`).join('')}</div>
    <div class="field"><label>Mobile money number</label>
      <input class="mono" id="phone" inputmode="numeric" placeholder="024 123 4567" maxlength="13" autocomplete="tel">
      <div class="err" id="phoneErr">Enter a valid 10-digit number</div></div>
    <div class="hint">${info}You will receive a prompt on your phone to approve this payment.</div>
    ${payBtn(payLabel)}`;
  if(m==='bank') return `
    <div class="hint">${info}A one-time virtual account will be generated for your transfer.</div>
    ${payBtn('Continue')}`;
  if(m==='ussd') return `
    <div class="hint">${info}A USSD code will be generated. Dial it from your registered line.</div>
    ${payBtn('Continue')}`;
}

function bindForm(){
  const m=S.method;
  if(m==='card'){
    const ccn=$('#ccn'),exp=$('#exp'),cvv=$('#cvv'),brand=$('#brand');
    ccn.addEventListener('input',()=>{
      let v=ccn.value.replace(/\D/g,'').slice(0,16);
      ccn.value=v.replace(/(.{4})/g,'$1 ').trim();
      const b=detectBrand(v);brand.textContent=b;brand.style.display=b?'':'none';
      ccn.classList.remove('bad');$('#ccnErr').classList.remove('show');
    });
    exp.addEventListener('input',()=>{
      let v=exp.value.replace(/\D/g,'').slice(0,4);
      if(v.length>=3)v=v.slice(0,2)+' / '+v.slice(2);
      exp.value=v;exp.classList.remove('bad');$('#expErr').classList.remove('show');
    });
    cvv.addEventListener('input',()=>{cvv.value=cvv.value.replace(/\D/g,'').slice(0,4);cvv.classList.remove('bad');$('#cvvErr').classList.remove('show');});
    $('#pay').addEventListener('click',()=>{
      let ok=true;
      const num=ccn.value.replace(/\s/g,'');
      if(num.length<16||!luhn(num)){ccn.classList.add('bad');$('#ccnErr').classList.add('show');ok=false;}
      const em=exp.value.replace(/\D/g,'');
      if(em.length<4||+em.slice(0,2)<1||+em.slice(0,2)>12){exp.classList.add('bad');$('#expErr').classList.add('show');ok=false;}
      if(cvv.value.length<3){cvv.classList.add('bad');$('#cvvErr').classList.add('show');ok=false;}
      if(!ok)return;
      const parts=exp.value.replace(/\s/g,'').split('/');
      const month=parts[0]||'';let year=parts[1]||'';if(year.length===2)year='20'+year;
      submitPay($('#pay'),'card',{number:num,cvv:cvv.value,expiry_month:month,expiry_year:year});
    });
  }else if(m==='momo'){
    $('#prov').querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{S.provider=btn.dataset.p;$('#prov').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));}));
    const phone=$('#phone');
    phone.addEventListener('input',()=>{phone.value=phone.value.replace(/[^\d ]/g,'');phone.classList.remove('bad');$('#phoneErr').classList.remove('show');});
    $('#pay').addEventListener('click',()=>{
      const d=phone.value.replace(/\D/g,'');
      if(d.length<10){phone.classList.add('bad');$('#phoneErr').classList.add('show');return;}
      submitPay($('#pay'),'mobile_money',{phone:d,provider:S.provider});
    });
  }else if(m==='bank'){
    $('#pay').addEventListener('click',()=>submitPay($('#pay'),'bank',{}));
  }else if(m==='ussd'){
    $('#pay').addEventListener('click',()=>submitPay($('#pay'),'ussd',{}));
  }
}

async function submitPay(btn,method,details){
  btn.classList.add('loading');
  const email=($('#email')&&$('#email').value.trim())||'';
  try{
    const {charge,next,detail}=await API.post(`/api/charges/${S.charge.reference}/pay`,{method,email,...details});
    S.charge=charge;
    btn.classList.remove('loading');
    handleNext(next,detail);
  }catch(err){
    btn.classList.remove('loading');
    alert(err.message);
  }
}

function handleNext(next,detail){
  if(next==='success')go('success');
  else if(next==='failed')go('failed');
  else if(next==='otp')go('otp');
  else if(next==='pin')go('pin');
  else if(next==='bank_details'){S.bankDetail=detail;go('bank');}
  else{go('approve');startPolling();}
}

let _poll=null;
function startPolling(){
  if(_poll)clearInterval(_poll);
  _poll=setInterval(async()=>{
    try{
      const {charge,next}=await API.get(`/api/charges/${S.charge.reference}/poll`);
      S.charge=charge;
      if(next==='success'||next==='failed'){clearInterval(_poll);_poll=null;go(next);}
    }catch(e){}
  },3500);
  setTimeout(()=>{if(_poll){clearInterval(_poll);_poll=null;}},600000);
}

function render(){
  const b=$('#body');
  if(!S.charge){b.innerHTML='<div class="state"><div class="spinbig"></div><h3>Loading checkout…</h3></div>';return;}
  if(S.step==='form'){
    $('#amtLbl').textContent='Pay '+merchantName();
    $('#amtV').textContent=fmt(amount(),ccy());
    b.innerHTML=tabs()+formFor(S.method);
    b.querySelectorAll('.mtab').forEach(t=>t.addEventListener('click',()=>{S.method=t.dataset.m;render();}));
    bindForm();
  }
  else if(S.step==='otp')renderOtp(b);
  else if(S.step==='pin')renderPin(b);
  else if(S.step==='approve')b.innerHTML=stateApprove();
  else if(S.step==='bank')renderBankDetails(b);
  else if(S.step==='success')b.innerHTML=stateSuccess();
  else if(S.step==='failed')b.innerHTML=stateFailed();
}
function go(step){S.step=step;render();}

function renderOtp(b){
  b.innerHTML=`<button class="back" id="back">← Back</button>
    <div class="state">
      <div class="ic" style="background:var(--plum-tint);color:var(--plum)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
      <h3>Verify it's you</h3><p>Enter the 6-digit OTP sent to the phone number linked to your card.</p>
      <div class="otp-boxes" id="otp">${Array.from({length:6}).map((_,i)=>`<input inputmode="numeric" maxlength="1" data-i="${i}">`).join('')}</div>
      <button class="pay" id="verify" disabled><span class="spin"></span><span class="lbl">Confirm — ${fmt(amount(),ccy())}</span></button>
    </div>`;
  $('#back').addEventListener('click',()=>go('form'));
  const boxes=[...$('#otp').querySelectorAll('input')];
  const check=()=>$('#verify').disabled=boxes.map(x=>x.value).join('').length<6;
  boxes.forEach((bx,i)=>{
    bx.addEventListener('input',()=>{bx.value=bx.value.replace(/\D/g,'');if(bx.value&&i<5)boxes[i+1].focus();check();});
    bx.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!bx.value&&i>0)boxes[i-1].focus();});
  });
  boxes[0].focus();
  $('#verify').addEventListener('click',async()=>{
    const v=$('#verify'),otp=boxes.map(x=>x.value).join('');
    v.classList.add('loading');
    try{const {charge,next,detail}=await API.post(`/api/charges/${S.charge.reference}/submit-otp`,{otp});S.charge=charge;v.classList.remove('loading');handleNext(next,detail);}
    catch(err){v.classList.remove('loading');alert(err.message);}
  });
}

function renderPin(b){
  b.innerHTML=`<button class="back" id="back">← Back</button>
    <div class="state">
      <div class="ic" style="background:var(--plum-tint);color:var(--plum)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
      <h3>Enter your card PIN</h3><p>Enter your 4-digit card PIN to authorise this payment.</p>
      <div class="otp-boxes" id="pin">${Array.from({length:4}).map((_,i)=>`<input inputmode="numeric" maxlength="1" type="password" data-i="${i}">`).join('')}</div>
      <button class="pay" id="submitPin" disabled><span class="spin"></span><span class="lbl">Continue</span></button>
    </div>`;
  $('#back').addEventListener('click',()=>go('form'));
  const boxes=[...$('#pin').querySelectorAll('input')];
  const check=()=>$('#submitPin').disabled=boxes.map(x=>x.value).join('').length<4;
  boxes.forEach((bx,i)=>{
    bx.addEventListener('input',()=>{bx.value=bx.value.replace(/\D/g,'');if(bx.value&&i<3)boxes[i+1].focus();check();});
    bx.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!bx.value&&i>0)boxes[i-1].focus();});
  });
  boxes[0].focus();
  $('#submitPin').addEventListener('click',async()=>{
    const v=$('#submitPin'),pin=boxes.map(x=>x.value).join('');
    v.classList.add('loading');
    try{const {charge,next,detail}=await API.post(`/api/charges/${S.charge.reference}/submit-pin`,{pin});S.charge=charge;v.classList.remove('loading');handleNext(next,detail);}
    catch(err){v.classList.remove('loading');alert(err.message);}
  });
}

function renderBankDetails(b){
  const a=S.bankDetail||{};
  b.innerHTML=`<div class="detail-box">
    <div class="drow"><span class="k">BANK</span><span class="v">${a.bank_name||'—'}</span></div>
    <div class="drow"><span class="k">ACCOUNT</span><span class="v">${a.account_number||'—'} <button class="copy" data-c="${a.account_number||''}">copy</button></span></div>
    <div class="drow"><span class="k">AMOUNT</span><span class="v">${fmt(amount(),ccy())}</span></div>
  </div>
  <div class="hint" style="justify-content:center"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Transfer the exact amount above. Waiting for confirmation…</div>`;
  b.querySelectorAll('.copy').forEach(c=>c.addEventListener('click',()=>{navigator.clipboard&&navigator.clipboard.writeText(c.dataset.c).catch(()=>{});c.textContent='copied!';setTimeout(()=>c.textContent='copy',1200);}));
  startPolling();
}

function stateApprove(){
  const p=S.provider||'';
  return `<div class="state">
    <div class="ic phone-pulse"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg></div>
    <h3>Approve on your phone</h3>
    <p>A prompt has been sent to your ${p?p+' ':''}line. Enter your mobile money PIN to authorise ${fmt(amount(),ccy())}.</p>
    <div class="hint" style="justify-content:center;margin-top:14px"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Waiting for confirmation…</div>
  </div>`;
}

function stateSuccess(){
  if(_poll){clearInterval(_poll);_poll=null;}
  $('#amtLbl').textContent='Paid to '+merchantName();
  const ch=S.charge.auth&&S.charge.auth.channel;
  const ML={card:'Card',mobile_money:'Mobile money',bank_transfer:'Bank transfer',ussd:'USSD'};
  const methodLabel=ML[ch||S.charge.method]||S.charge.method||'—';
  return `<div class="state">
    <div class="ic done-ic"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h3>Payment successful</h3><p>Your payment of ${fmt(amount(),ccy())} to ${merchantName()} is complete.</p>
    <div class="receipt">
      <div class="drow"><span class="k">REFERENCE</span><span class="v">${S.charge.reference}</span></div>
      <div class="drow"><span class="k">METHOD</span><span class="v">${methodLabel}</span></div>
      <div class="drow"><span class="k">AMOUNT</span><span class="v" style="color:var(--mint)">${fmt(amount(),ccy())}</span></div>
    </div>
    <button class="pay" id="ret">Return to ${merchantName()}</button>
  </div>`;
}

function stateFailed(){
  if(_poll){clearInterval(_poll);_poll=null;}
  const f=S.charge.failure||{message:'Your payment could not be processed.'};
  return `<div class="state">
    <div class="ic" style="background:var(--coral-tint);color:var(--coral)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg></div>
    <h3>Payment failed</h3><p>${f.message}</p>
    <button class="pay" id="retry" style="margin-top:10px">Try again</button>
  </div>`;
}

function routeFromCharge(){
  const st=S.charge.status;
  if(st==='success')go('success');
  else if(st==='failed')go('failed');
  else go('form');
}

async function boot(){
  const params=new URLSearchParams(location.search);
  const ref=params.get('reference');
  try{
    if(ref){
      try{
        const {charge}=await API.get('/api/charges/'+encodeURIComponent(ref));
        S.charge=charge;
      }catch(e){
        const isDemoReload=document.referrer.includes(location.host)||!document.referrer;
        if(isDemoReload){
          history.replaceState(null,'',location.pathname);
          const {publicKey}=await API.get('/api/demo/public-key');
          const email=($('#email')&&$('#email').value)||'demo@cowrie.africa';
          const {charge}=await API.post('/api/charges',{amount:25000,currency:'GHS',email},{'x-public-key':publicKey});
          S.charge=charge;
          history.replaceState(null,'','?reference='+charge.reference);
        }else{
          $('#body').innerHTML=`<div class="state">
            <div class="ic" style="background:var(--gold-tint);color:var(--gold-deep)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg></div>
            <h3>Payment link expired</h3>
            <p>This payment link is no longer valid. Please contact the merchant for a new link.</p>
          </div>`;
          return;
        }
      }
    }else{
      const {publicKey}=await API.get('/api/demo/public-key');
      const email=($('#email')&&$('#email').value)||'demo@cowrie.africa';
      const {charge}=await API.post('/api/charges',{amount:25000,currency:'GHS',email},{'x-public-key':publicKey});
      S.charge=charge;
      history.replaceState(null,'','?reference='+charge.reference);
    }
  }catch(err){
    $('#body').innerHTML=`<div class="state"><h3>Couldn't start checkout</h3><p>${err.message}</p></div>`;
    return;
  }
  routeFromCharge();
}

document.addEventListener('click',e=>{
  if(e.target&&e.target.id==='ret')location.href='/';
  if(e.target&&e.target.id==='retry')location.reload();
});
boot();
</script>
</body>
</html>
