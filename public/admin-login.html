<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie — Admin console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#5B2C8F; --plum-deep:#3D1D62; --plum-light:#7B45B8;
  --gold:#C8860A; --mint:#1A9B6E; --coral:#EF6A4C;
  --dark:#09071A; --dark2:#120C24; --dark3:#1C1335;
  --display:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--dark);color:#fff;font-family:var(--display);
  -webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;
}
/* ambient glows */
body::before{content:'';position:fixed;top:-25%;left:-20%;width:65%;height:65%;background:radial-gradient(circle,rgba(91,44,143,.4),transparent 65%);filter:blur(70px);pointer-events:none}
body::after{content:'';position:fixed;bottom:-25%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(200,134,10,.22),transparent 65%);filter:blur(60px);pointer-events:none}
/* dot grid */
.bg-dots{position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1.2px,transparent 1.2px);background-size:28px 28px;pointer-events:none;z-index:0}

.shell{width:26px;height:26px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum-light));position:relative;flex-shrink:0;box-shadow:inset 0 -2px 4px rgba(0,0,0,.25)}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2px;background:rgba(255,255,255,.65);transform:translateX(-50%);border-radius:2px}

.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  border-radius:22px;padding:40px 40px 36px;
  backdrop-filter:blur(20px);
  box-shadow:0 32px 80px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08);
}

.card-top{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.brand-name{font-weight:800;font-size:19px;letter-spacing:-.02em}

.restricted-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(91,44,143,.2);border:1px solid rgba(91,44,143,.35);
  border-radius:8px;padding:7px 13px;
  font-family:var(--mono);font-size:10px;color:#C9AEFF;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:26px;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#9B5CF6;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

h1{font-size:27px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px}
.sub{color:rgba(255,255,255,.45);font-size:14px;margin-bottom:30px;line-height:1.55}

.field{margin-bottom:18px}
.field label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:9px}
.field input{
  width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);
  border-radius:10px;padding:13px 16px;color:#fff;font-family:var(--display);font-size:15px;
  outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none
}
.field input::placeholder{color:rgba(255,255,255,.22)}
.field input:focus{border-color:rgba(139,92,246,.65);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(91,44,143,.22)}
.field input.bad{border-color:rgba(239,106,76,.65);background:rgba(239,106,76,.07)}
.err{color:#F87171;font-size:12.5px;margin-top:5px;display:none;font-family:var(--mono)}
.err.show{display:block}

.btn{
  width:100%;height:52px;background:var(--plum);border:none;border-radius:10px;
  color:#fff;font-family:var(--display);font-weight:700;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  transition:background .15s,transform .15s,box-shadow .15s;position:relative;margin-top:6px;
}
.btn:hover{background:var(--plum-deep);transform:translateY(-1px);box-shadow:0 10px 28px -8px rgba(91,44,143,.5)}
.btn:active{transform:none;box-shadow:none}
.btn.loading{color:transparent;pointer-events:none}
.btn .spin{position:absolute;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spin{display:block}
.btn.done{background:var(--mint);pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}

.card-foot{margin-top:26px;text-align:center;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.25)}
.card-foot a{color:rgba(139,92,246,.7);font-weight:500}
.card-foot a:hover{color:#A78BFA}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="bg-dots"></div>

<div class="card">
  <div class="card-top">
    <span class="shell"></span>
    <span class="brand-name">Cowrie</span>
  </div>

  <div class="restricted-badge"><span class="badge-dot"></span>Admin console</div>

  <h1>Restricted access.</h1>
  <p class="sub">Enter your administrator credentials to continue. This area is monitored and audited.</p>

  <form id="adminForm" novalidate>
    <div class="field">
      <label for="email">Admin email</label>
      <input type="email" id="email" placeholder="admin@cowrie.africa" autocomplete="email">
      <div class="err" id="emailErr">Enter a valid email</div>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="err" id="passwordErr">Enter your password</div>
    </div>
    <div class="err" id="formErr" style="margin-top:8px;margin-bottom:12px"></div>
    <button type="submit" class="btn" id="submitBtn">
      <span class="lbl">Sign in to admin console</span><span class="spin"></span>
    </button>
  </form>

  <div class="card-foot">
    <a href="/login">← Merchant login</a>
  </div>
</div>

<script>
'use strict';


const form=document.getElementById('adminForm');
const btn=document.getElementById('submitBtn');
const emailEl=document.getElementById('email');
const passwordEl=document.getElementById('password');
const formErr=document.getElementById('formErr');

[emailEl,passwordEl].forEach(el=>{
  el.addEventListener('input',()=>{
    el.classList.remove('bad');
    const err=document.getElementById(el.id+'Err');
    if(err)err.classList.remove('show');
    formErr.classList.remove('show');
  });
});

form.addEventListener('submit',async e=>{
  e.preventDefault();
  formErr.classList.remove('show');
  let ok=true;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim())){emailEl.classList.add('bad');document.getElementById('emailErr').classList.add('show');ok=false;}
  if(!passwordEl.value){passwordEl.classList.add('bad');document.getElementById('passwordErr').classList.add('show');ok=false;}
  if(!ok)return;
  btn.classList.add('loading');
  try{
    const res=await fetch('/api/admin/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:emailEl.value.trim(),password:passwordEl.value})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.message||'Login failed.');
    localStorage.setItem('cowrie_admin_token',data.token);
    btn.classList.remove('loading');btn.classList.add('done');btn.querySelector('.lbl').textContent='Signed in ✓';
    const next=new URLSearchParams(location.search).get('next')||'/admin';
    setTimeout(()=>{location.href=next;},450);
  }catch(err){
    btn.classList.remove('loading');
    formErr.textContent=err.message;formErr.classList.add('show');
    passwordEl.value='';passwordEl.classList.add('bad');
  }
});
</script>
</body>
</html>
