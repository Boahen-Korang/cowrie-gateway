<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowrie — Admin login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#F7F5F0;--white:#FFFFFF;
  --ink:#1B1330;--ink-soft:#564E68;--muted:#7A7388;--faint:#A39CB0;
  --line:#E8E3DA;
  --plum:#5B2C8F;--plum-deep:#3A1A60;--plum-tint:#EFE6F7;
  --gold:#E0A12E;--mint:#1FA877;--coral:#EF6A4C;
  --dark:#0F0B1E;--dark2:#1B1330;--dark3:#241844;
  --display:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#fff;font-family:var(--display);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;top:-20%;left:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(91,44,143,.35),transparent 65%);filter:blur(40px);pointer-events:none}
body::after{content:'';position:fixed;bottom:-20%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(224,161,46,.18),transparent 65%);filter:blur(40px);pointer-events:none}

.card{width:100%;max-width:400px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:40px 36px;position:relative;z-index:1;backdrop-filter:blur(20px)}

.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.shell{width:30px;height:30px;border-radius:50% 50% 48% 48%/60% 60% 40% 40%;background:linear-gradient(135deg,var(--gold),var(--plum));position:relative;box-shadow:inset 0 -2px 4px rgba(0,0,0,.3)}
.shell::before{content:'';position:absolute;left:50%;top:18%;bottom:18%;width:2.5px;background:rgba(255,255,255,.65);transform:translateX(-50%);border-radius:2px}
.brand-txt{font-weight:800;font-size:20px;letter-spacing:-.02em}

.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(91,44,143,.3);border:1px solid rgba(91,44,143,.5);border-radius:8px;padding:6px 11px;font-family:var(--mono);font-size:10.5px;color:#C9AEFF;margin-bottom:22px;letter-spacing:.04em}
.badge .dot{width:6px;height:6px;border-radius:50%;background:#8B5CF6;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

h1{font-size:26px;font-weight:800;letter-spacing:-.025em;margin-bottom:6px}
.sub{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:28px}

.field{margin-bottom:16px}
.field label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px}
.field input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:11px;padding:13px 15px;color:#fff;font-family:var(--display);font-size:15px;outline:none;transition:.18s}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:rgba(139,92,246,.7);background:rgba(255,255,255,.1);box-shadow:0 0 0 4px rgba(91,44,143,.25)}
.field input.bad{border-color:rgba(239,106,76,.7);background:rgba(239,106,76,.08)}

.err{color:#F87171;font-size:12.5px;margin-top:5px;display:none;font-family:var(--mono)}
.err.show{display:block}

.btn{width:100%;background:var(--plum);border:none;border-radius:11px;padding:14px;color:#fff;font-family:var(--display);font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:.22s;position:relative;margin-top:6px}
.btn:hover{background:var(--plum-deep)}
.btn:disabled{opacity:.55;pointer-events:none}
.btn.loading{color:transparent}
.btn .spin{position:absolute;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:none;animation:spin .7s linear infinite}
.btn.loading .spin{display:block}
.btn.done{background:var(--mint);pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{margin-top:22px;padding:14px 16px;background:rgba(224,161,46,.1);border:1px solid rgba(224,161,46,.2);border-radius:11px}
.hint-title{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(224,161,46,.8);margin-bottom:8px}
.hint-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.55);padding:3px 0}
.hint-row .val{color:rgba(255,255,255,.85);font-weight:700}

.foot{margin-top:26px;text-align:center;font-size:13px;color:rgba(255,255,255,.35)}
.foot a{color:rgba(139,92,246,.8);font-weight:600}
.foot a:hover{color:#A78BFA}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="shell"></span>
    <span class="brand-txt">Cowrie</span>
  </div>

  <div style="text-align:center;margin-bottom:22px">
    <span class="badge"><span class="dot"></span>ADMIN CONSOLE</span>
  </div>

  <h1>Admin sign in</h1>
  <p class="sub">Restricted access — admin credentials required.</p>

  <form id="adminForm" novalidate>
    <div class="field">
      <label for="email">Admin email</label>
      <input type="email" id="email" placeholder="admin@cowrie.africa" autocomplete="email">
      <div class="err" id="emailErr">Enter a valid email</div>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="err" id="passwordErr">Enter your password</div>
    </div>

    <div class="err" id="formErr" style="margin-top:8px;margin-bottom:10px"></div>

    <button type="submit" class="btn" id="submitBtn">
      <span class="lbl">Sign in as admin</span>
      <span class="spin"></span>
    </button>
  </form>

  <div class="hint">
    <div class="hint-title">Default test credentials</div>
    <div class="hint-row"><span>Email</span><span class="val">admin@cowrie.africa</span></div>
    <div class="hint-row"><span>Password</span><span class="val">admin2026</span></div>
  </div>

  <div class="foot">
    <a href="/login">← Back to merchant login</a>
  </div>
</div>

<script>
'use strict';

if (localStorage.getItem('cowrie_admin_token')) {
  location.href = '/admin';
  throw 0;
}

const form = document.getElementById('adminForm');
const btn  = document.getElementById('submitBtn');
const emailEl = document.getElementById('email');
const passwordEl = document.getElementById('password');
const formErr = document.getElementById('formErr');

[emailEl, passwordEl].forEach(el => {
  el.addEventListener('input', () => {
    el.classList.remove('bad');
    const err = document.getElementById(el.id + 'Err');
    if (err) err.classList.remove('show');
    formErr.classList.remove('show');
  });
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  formErr.classList.remove('show');

  let ok = true;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim())) {
    emailEl.classList.add('bad');
    document.getElementById('emailErr').classList.add('show');
    ok = false;
  }
  if (!passwordEl.value) {
    passwordEl.classList.add('bad');
    document.getElementById('passwordErr').classList.add('show');
    ok = false;
  }
  if (!ok) return;

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('/api/admin/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email: emailEl.value.trim(), password: passwordEl.value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Login failed.');

    localStorage.setItem('cowrie_admin_token', data.token);
    btn.classList.remove('loading');
    btn.classList.add('done');
    btn.querySelector('.lbl').textContent = 'Signed in ✓';

    const next = new URLSearchParams(location.search).get('next') || '/admin';
    setTimeout(() => { location.href = next; }, 450);
  } catch (err) {
    btn.classList.remove('loading');
    btn.disabled = false;
    formErr.textContent = err.message;
    formErr.classList.add('show');
    passwordEl.value = '';
    passwordEl.classList.add('bad');
  }
});
</script>
</body>
</html>
