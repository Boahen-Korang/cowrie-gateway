databases:
  - name: cowrie-db
    plan: free
    databaseName: cowrie
    user: cowrie

services:
  - type: web
    name: cowrie
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cowrie-db
          property: connectionString
      - key: COWRIE_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://cowrie-gateway.onrender.com

      # Admin login credentials (set in Render dashboard)
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Gmail SMTP for OTP and KYC notification emails
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

      # Paystack — set test and live keys in Render dashboard
      - key: PAYSTACK_PK_TEST
        sync: false
      - key: PAYSTACK_SK_TEST
        sync: false
      - key: PAYSTACK_PK_LIVE
        sync: false
      - key: PAYSTACK_SK_LIVE
        sync: false
