databases:
  - name: cowrie-db
    plan: free
    databaseName: cowrie
    user: cowrie

services:
  - type: web
    name: cowrie
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cowrie-db
          property: connectionString
      - key: COWRIE_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://cowrie-gateway.onrender.com

      # Admin login credentials (set in Render dashboard)
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Email — Resend is preferred (higher limits); Gmail is fallback
      # If RESEND_API_KEY is set, GMAIL_* are ignored
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Cowrie Payments <noreply@cowrie.africa>
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

      # Cloudinary — for KYC document storage (keeps DB size small)
      # Sign up free at cloudinary.com, then set these three values
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Paystack — set test and live keys in Render dashboard
      - key: PAYSTACK_PK_TEST
        sync: false
      - key: PAYSTACK_SK_TEST
        sync: false
      - key: PAYSTACK_PK_LIVE
        sync: false
      - key: PAYSTACK_SK_LIVE
        sync: false
