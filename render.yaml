databases:
  - name: cowrie-db
    plan: free
    databaseName: cowrie
    user: cowrie

services:
  - type: web
    name: cowrie
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cowrie-db
          property: connectionString
      - key: COWRIE_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@cowrie.africa
      - key: ADMIN_PASSWORD
        value: admin2026
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Cowrie <noreply@cowrie.africa>
